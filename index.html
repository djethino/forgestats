<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeStats — repo & release stats across forges</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #f78166;
  --accent4: #d2a8ff;
  --yellow: #e3b341;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

header .container {
  display: flex;
  align-items: center;
  gap: 16px;
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

header h1 svg { fill: var(--text); }

.header-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
  font-size: 14px;
}

.breadcrumb a { cursor: pointer; }

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
}

.rate-limit { font-size: 12px; color: var(--text2); }

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Stats cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.stat-card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}

.stat-card .label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-card.highlight {
  border-color: var(--accent2);
  background: linear-gradient(135deg, rgba(63, 185, 80, 0.08), transparent);
}

.stat-card.highlight .value { color: var(--accent2); }

.stat-card.downloads {
  border-color: var(--accent4);
  background: linear-gradient(135deg, rgba(210, 168, 255, 0.08), transparent);
}

.stat-card.downloads .value { color: var(--accent4); }

/* Section */
.section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}

/* Release banner */
.release-banner {
  background: linear-gradient(135deg, rgba(63, 185, 80, 0.1), rgba(88, 166, 255, 0.05));
  border: 1px solid var(--accent2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.release-banner .release-tag {
  background: var(--accent2);
  color: #000;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 16px;
  white-space: nowrap;
}

.release-banner .release-info { flex: 1; min-width: 200px; }

.release-banner .release-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.release-banner .release-meta {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.release-banner .release-downloads {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent4);
  text-align: right;
  white-space: nowrap;
}

.release-banner .release-downloads small {
  display: block;
  font-size: 11px;
  color: var(--text2);
  font-weight: 400;
}

/* Repo grid */
.repo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 12px;
}

.repo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.repo-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.repo-card .repo-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}

.repo-card .repo-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.4;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.repo-card .repo-meta {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--text2);
  flex-wrap: wrap;
}

.repo-card .repo-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.repo-card .repo-release {
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.repo-card .repo-release .tag {
  color: var(--accent2);
  font-weight: 600;
}

.repo-card .repo-release .dl {
  color: var(--accent4);
  font-weight: 600;
}

.lang-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.badge-archived {
  background: rgba(227, 179, 65, 0.12);
  color: var(--yellow);
  border: 1px solid rgba(227, 179, 65, 0.4);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  vertical-align: middle;
  white-space: nowrap;
}

.badge-private {
  background: rgba(248, 81, 73, 0.1);
  color: var(--accent3);
  border: 1px solid rgba(248, 81, 73, 0.4);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  vertical-align: middle;
  white-space: nowrap;
}

.badge-template {
  background: rgba(88, 166, 255, 0.08);
  color: var(--accent);
  border: 1px solid rgba(88, 166, 255, 0.4);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  vertical-align: middle;
  white-space: nowrap;
}

.badge-pre {
  background: rgba(227, 179, 65, 0.12);
  color: var(--yellow);
  border: 1px solid rgba(227, 179, 65, 0.4);
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
  padding: 1px 7px;
  white-space: nowrap;
}

/* Detail page */
.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.detail-header .info { flex: 1; min-width: 250px; }
.detail-header .info h2 { font-size: 24px; margin-bottom: 6px; }
.detail-header .info p { color: var(--text2); font-size: 14px; line-height: 1.5; }

.detail-header .actions {
  display: flex;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover { background: var(--surface2); text-decoration: none; }

.btn-mini {
  padding: 3px 10px;
  font-size: 11px;
  border-radius: 6px;
}

.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.chart-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text2);
}

/* Releases table */
.releases-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.release-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.release-wrap > summary { list-style: none; cursor: pointer; }
.release-wrap > summary::-webkit-details-marker { display: none; }
.release-wrap .release-item { border: none; background: transparent; }
.release-wrap[open] > summary { border-bottom: 1px solid var(--border); }
.release-wrap .release-assets { padding: 4px 0; }
.release-wrap .release-assets .release-item { padding: 6px 16px; }

.release-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.release-item .tag-name {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  white-space: nowrap;
}

.release-item .name { font-weight: 500; flex: 1; min-width: 120px; }

.release-item .date { color: var(--text2); font-size: 12px; white-space: nowrap; }

.release-item .downloads {
  color: var(--accent4);
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
}

/* Contributors */
.contributors-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.contributor {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px 4px 4px;
  font-size: 13px;
  color: var(--text);
}

.contributor img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.contributor .initial {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--accent);
}

/* Topics */
.topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

.topic {
  background: rgba(88, 166, 255, 0.1);
  color: var(--accent);
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
}

/* Error */
.error-box {
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.4);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  color: var(--accent3);
}

/* Sort bar */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.sort-bar select, .sort-bar input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
}

.sort-bar input { flex: 1; min-width: 180px; }
.sort-bar select { cursor: pointer; }

/* Landing */
.landing { max-width: 560px; margin: 40px auto; }
.landing h2 { margin-bottom: 8px; }
.landing > p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

.landing-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.landing-form label { font-size: 13px; font-weight: 600; margin-top: 10px; }
.landing-form label .req { color: var(--accent3); font-weight: 400; font-size: 11px; }
.landing-form label .opt { color: var(--text2); font-weight: 400; font-size: 11px; }

.landing-form input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}

.landing-form input:focus { border-color: var(--accent); }

.btn-primary {
  justify-content: center;
  background: var(--accent2);
  border-color: var(--accent2);
  color: #000;
  font-weight: 600;
  margin-top: 16px;
}

.btn-primary:hover { background: #4cc961; }

.landing-error { color: var(--accent3); font-size: 13px; min-height: 18px; }

.landing-note { color: var(--text2); font-size: 12px; line-height: 1.5; margin-top: 4px; }
.landing-note code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

/* Responsive */
@media (max-width: 600px) {
  .repo-grid { grid-template-columns: 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .release-banner { flex-direction: column; align-items: flex-start; }
}
</style>

<body>

<header>
  <div class="container">
    <h1 onclick="navigateHome()" style="cursor:pointer" title="Home">
      <svg height="24" width="24" viewBox="0 0 24 24"><path d="M12 2 3 7v6c0 5 3.8 8.4 9 9 5.2-.6 9-4 9-9V7l-9-5zm0 2.2 7 3.9v4.9c0 4-3 6.7-7 7.3-4-.6-7-3.3-7-7.3V8.1l7-3.9z"/><path d="M8 11h8v2H8zm2 3h4v2h-4zm-1-6h6v2H9z"/></svg>
      ForgeStats
    </h1>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="header-right">
      <span class="rate-limit" id="rateLimit"></span>
    </div>
  </div>
</header>

<main class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>
</main>

<script>
const LANG_COLORS = {"JavaScript":"#f1e05a","TypeScript":"#3178c6","Python":"#3572A5","Java":"#b07219","C++":"#f34b7d","C#":"#178600","C":"#555555","Go":"#00ADD8","Rust":"#dea584","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Vue":"#41b883","Svelte":"#ff3e00","Lua":"#000080","R":"#198CE7","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Zig":"#ec915c","Nim":"#ffc200","GDScript":"#355570","GLSL":"#5686a5","HLSL":"#aace60"};

// ---- ENGINES ----
// A profile is {forge, host?, user}. `forge` is the API engine; `host` allows
// self-hosted GitLab / Gitea / Forgejo instances (codeberg.org is just Gitea).
const ENGINES = {
  github:      { main: true,  mirror: true,  counts: true,  color: '#d2a8ff' },
  gitlab:      { main: true,  mirror: false, counts: false, color: '#fc6d26' },
  gitea:       { main: true,  mirror: true,  counts: true,  color: '#2185d0' },
  sourceforge: { main: false, mirror: true,  counts: true,  color: '#ff6600' },
};

function forgeLabel(p) {
  switch (p.forge) {
    case 'github': return 'GitHub';
    case 'sourceforge': return 'SourceForge';
    case 'gitlab': return p.host === 'gitlab.com' ? 'GitLab' : p.host;
    case 'gitea': return p.host === 'codeberg.org' ? 'Codeberg' : p.host;
  }
}

function forgeColor(p) { return ENGINES[p.forge].color; }

// ---- STATE (populated from the URL: #main=forge:user&mirrors=forge:user,...&repo=name) ----
const state = {
  main: null,
  mirrors: [],       // [{forge, host?, user, names, map: {repoName -> target|null}, _rels: {}}]
  key: '',
  repoCache: {},     // repo objects from the dashboard, fallback if getRepo fails on the detail page
};

// localStorage cache (30 min): stretches anonymous API rate limits
const CACHE_TTL = 30 * 60 * 1000;

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('fgs:' + key);
    if (!raw) return null;
    const { t, v } = JSON.parse(raw);
    if (Date.now() - t > CACHE_TTL) return null;
    return v;
  } catch { return null; }
}

function cacheSet(key, v) {
  try { localStorage.setItem('fgs:' + key, JSON.stringify({ t: Date.now(), v })); } catch {}
}

// Optional GitHub token, stored only in the browser (never in the URL or the code)
function getToken() {
  try { return localStorage.getItem('fgs_token') || ''; } catch { return ''; }
}

// Persistent public/private scope filter — applies to ALL stats on the dashboard
function getVisFilter() {
  try { return localStorage.getItem('fgs_vis') || 'all'; } catch { return 'all'; }
}

function setVisFilter(v) {
  try { localStorage.setItem('fgs_vis', v); } catch {}
}

// Generic cached JSON fetch. GitHub calls get auth headers + rate-limit display, and skip
// the localStorage cache when a token is present (no private data written to disk) — but an
// in-memory session cache always applies, so navigating around doesn't re-burst the API
// (bursts can trip GitHub's abuse detection, which answers 503 without CORS headers).
// Transient failures are retried, and authenticated GitHub calls that keep failing with 5xx
// are retried once anonymously: public data still loads when GitHub rejects the token.
const memCache = new Map();

async function apiFetch(url, isGitHub = false) {
  if (memCache.has(url)) return memCache.get(url);
  const useCache = !(isGitHub && getToken());
  if (useCache) {
    const cached = cacheGet(url);
    if (cached !== null) { memCache.set(url, cached); return cached; }
  }
  const opts = {};
  if (isGitHub) {
    opts.headers = { 'Accept': 'application/vnd.github.v3+json' };
    const token = getToken();
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  }
  const u = new URL(url);
  let lastErr = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt) await new Promise(r => setTimeout(r, 800 * attempt));
    let resp;
    try {
      resp = await fetch(url, opts);
    } catch {
      lastErr = new Error(`Network/CORS error on ${u.hostname}${u.pathname}. This is usually a transient API failure (5xx responses carry no CORS headers) — retry in a moment. A browser extension blocking requests can also cause it.`);
      continue;
    }
    if (isGitHub) {
      const remaining = resp.headers.get('X-RateLimit-Remaining');
      const limit = resp.headers.get('X-RateLimit-Limit');
      if (remaining !== null) {
        document.getElementById('rateLimit').textContent = `GitHub API: ${remaining}/${limit}`;
      }
    }
    if (!resp.ok) {
      // Explicit message when the anonymous GitHub rate limit is exhausted
      if (isGitHub && (resp.status === 403 || resp.status === 429) && resp.headers.get('X-RateLimit-Remaining') === '0') {
        const reset = parseInt(resp.headers.get('X-RateLimit-Reset') || '0', 10) * 1000;
        const mins = Math.max(1, Math.ceil((reset - Date.now()) / 60000));
        throw new Error(`GitHub API rate limit reached (60 requests/hour without a token). Add a token on the home page for 5,000/hour, or retry in ~${mins} min.`);
      }
      if (resp.status >= 500) {
        lastErr = new Error(`API ${resp.status}: ${resp.statusText} on ${u.hostname}${u.pathname} — transient server error, retry in a moment.`);
        continue;
      }
      throw new Error(`API ${resp.status}: ${resp.statusText} (${u.hostname}${u.pathname})`);
    }
    const data = await resp.json();
    memCache.set(url, data);
    if (useCache) cacheSet(url, data);
    return data;
  }
  // Anonymous fallback for authenticated GitHub calls stuck on 5xx (works for public data)
  if (isGitHub && getToken()) {
    try {
      const r2 = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (r2.ok) {
        const d2 = await r2.json();
        memCache.set(url, d2);
        return d2;
      }
    } catch {}
  }
  throw lastErr;
}

// ---- NORMALIZED MODEL ----
// repo:    {name, description, language, stars, forks, issues, watchers, updated, pushed, created,
//           url, homepage, topics, private, archived, sizeKB, branch, license, fork}
// release: {tag, name, date, prerelease, assets: [{name, size, downloads}]}  (downloads: null = not tracked)

function isHashAsset(name) {
  return /(\.sha256(sum)?(\.txt)?$|^sha256sums?(\.txt)?$)/i.test(name);
}

function countableAssets(release) {
  return (release && release.assets ? release.assets : []).filter(a => !isHashAsset(a.name));
}

// Main-forge downloads of a release; null when the forge doesn't track them (GitLab)
function releaseMainDl(release) {
  if (!release) return 0;
  if (!ENGINES[state.main.forge].counts) return null;
  return countableAssets(release).reduce((sum, a) => sum + (a.downloads || 0), 0);
}

// ---- ADAPTERS (each method takes a profile object p = {forge, host?, user}) ----

const adapters = {

  github: {
    async listRepos(p) {
      // If the provided token belongs to the requested profile, include private repos
      let baseUrl = `https://api.github.com/users/${p.user}/repos?type=public`;
      state.githubAuthOwner = false;
      if (getToken()) {
        try {
          const me = await apiFetch('https://api.github.com/user', true);

// ---- SOURCEFORGE (mirror only) ----

function normalizeName(s) {
  return s.toLowerCase().replace(/[^a-z0-9]/g, '');
}

// SourceForge projects of a user via the Allura REST API (CORS allowed)
async function fetchSfProjects(sfUser) {
  const key = `sfprofile:${sfUser}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    const resp = await fetch(`https://sourceforge.net/rest/u/${encodeURIComponent(sfUser)}/profile`);
    if (!resp.ok) return [];
    const data = await resp.json();
    const projects = (data.projects || []).map(p => ({
      name: p.name,
      slug: (p.url.match(/\/p\/([^/]+)/) || [])[1] || ''
    })).filter(p => p.slug);
    cacheSet(key, projects);
    return projects;
  } catch { return []; }
}

// SF download total for a folder (path = release tag) or the whole project (empty path)
async function fetchSfDownloads(project, path = '') {
  const key = `sfdl:${project}:${path}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    const end = new Date().toISOString().slice(0, 10);
    const folder = path ? encodeURIComponent(path) + '/' : '';
    const url = `https://sourceforge.net/projects/${project}/files/${folder}stats/json?start_date=2000-01-01&end_date=${end}`;
    // redirect: 'error' — a missing SF folder redirects (301) to the HTML files page
    const resp = await fetch(url, { redirect: 'error' });
    if (!resp.ok) return 0;
    const data = await resp.json();
    const total = data.total || 0;
    cacheSet(key, total);
    return total;
  } catch { return 0; }
}

// ---- MIRRORS ----

// Loads each mirror's project list once, then matches the given repos by normalized name
async function resolveMirrors(repoNames) {
  await Promise.all(state.mirrors.map(async m => {
    if (!m.names) {
      if (m.forge === 'sourceforge') {
        m.names = await fetchSfProjects(m.user);
      } else {
        const repos = await adapters[m.forge].listRepos(m).catch(() => []);
        m.names = repos.map(r => ({ name: r.name, slug: r.name }));
      }
      m.map = {};
      m._rels = {};
    }
    repoNames.forEach(rn => {
      if (rn in m.map) return;
      const n = normalizeName(rn);
      const match = m.names.find(p => normalizeName(p.slug) === n || normalizeName(p.name) === n);
      m.map[rn] = match ? match.slug : null;
    });
  }));
}

// Mirrors matching a given repo: [{m, target}]
function mirrorsOf(repoName) {
  return state.mirrors
    .filter(m => m.map && m.map[repoName])
    .map(m => ({ m, target: m.map[repoName] }));
}

// Download count of one release tag on one mirror
async function mirrorDlForTag(entry, tag) {
  const { m, target } = entry;
  if (m.forge === 'sourceforge') return fetchSfDownloads(target, tag);
  // github / gitea: fetch the mirror repo's releases once, then read tags from memory
  if (!m._rels[target]) {
    m._rels[target] = adapters[m.forge].listReleases(m, target).then(rels => {
      const map = {};
      rels.forEach(r => { map[r.tag] = countableAssets(r).reduce((s, a) => s + (a.downloads || 0), 0); });
      return map;
    });
  }
  const map = await m._rels[target];
  return map[tag] || 0;
}

// All mirror contributions for a tag: [{label, forge, count}] (only counts > 0)
async function mirrorPartsForTag(repoName, tag) {
  const entries = mirrorsOf(repoName);
  const counts = await Promise.all(entries.map(e => mirrorDlForTag(e, tag)));
  return entries.map((e, i) => ({ label: forgeLabel(e.m), forge: e.m.forge, count: counts[i] }))
                .filter(p => p.count > 0);
}

function partsTotal(parts) { return parts.reduce((s, p) => s + p.count, 0); }

function partsTitle(mainDl, parts) {
  const bits = [];
  if (mainDl !== null) bits.push(`${forgeLabel(state.main)}: ${mainDl}`);
  parts.forEach(p => bits.push(`${p.label}: ${p.count}`));
  return bits.join(' · ');
}

// ---- LOCAL HISTORY ----
// Each visit records one snapshot per day in localStorage. Over time this builds
// evolution charts that the forge APIs don't provide (counters are cumulative-only).

function recordHistory(key, point) {
  try {
    const k = 'fgs_hist:' + key;
    const arr = JSON.parse(localStorage.getItem(k) || '[]');
    const day = new Date().toISOString().slice(0, 10);
    const entry = { d: day, ...point };
    const idx = arr.findIndex(e => e.d === day);
    if (idx >= 0) arr[idx] = entry; else arr.push(entry);
    while (arr.length > 400) arr.shift();
    localStorage.setItem(k, JSON.stringify(arr));
    return arr;
  } catch { return []; }
}

function historyChart(canvasId, hist, series) {
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      labels: hist.map(e => e.d),
      datasets: series.map(s => ({
        label: s.label,
        data: hist.map(e => e[s.key] ?? null),
        borderColor: s.color,
        backgroundColor: s.color + '22',
        pointBackgroundColor: s.color,
        pointRadius: 3,
        borderWidth: 2,
        tension: 0.2,
        fill: false,
        yAxisID: s.axis || 'y',
      }))
    },
    options: {
      plugins: { legend: { labels: { boxWidth: 12, padding: 10, font: { size: 11 } } } },
      scales: {
        x: { grid: { color: '#30363d22' }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
        y: { grid: { color: '#30363d33' }, beginAtZero: true, position: 'left' },
        y1: { grid: { display: false }, beginAtZero: true, position: 'right' }
      }
    }
  });
}

// ---- EXPORT ----

function toCsv(rows) {
  if (!rows.length) return '';
  const cols = Object.keys(rows[0]);
  const cell = v => {
    v = (v === null || v === undefined) ? '' : String(v);
    return /[",\n]/.test(v) ? `"${v.replace(/"/g, '""')}"` : v;
  };
  return [cols.join(','), ...rows.map(r => cols.map(c => cell(r[c])).join(','))].join('\n');
}

function downloadFile(name, mime, content) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function wireExport(csvId, jsonId, filenameBase, getRows) {
  const csvBtn = document.getElementById(csvId);
  const jsonBtn = document.getElementById(jsonId);
  if (csvBtn) csvBtn.addEventListener('click', () =>
    downloadFile(`${filenameBase}.csv`, 'text/csv', toCsv(getRows())));
  if (jsonBtn) jsonBtn.addEventListener('click', () =>
    downloadFile(`${filenameBase}.json`, 'application/json', JSON.stringify(getRows(), null, 2)));
}

// ---- HELPERS ----

// Escape external data before injecting into innerHTML (repo descriptions, release
// names, asset names, etc. are attacker-controlled free text)
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatNumber(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return `${days}d ago`;
  if (days < 365) return `${Math.floor(days / 30)}mo ago`;
  return `${Math.floor(days / 365)}y ago`;
}

async function renderDashboard() {
  const app = document.getElementById('app');
  const label = forgeLabel(state.main);
  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading ${esc(label)} repositories for <strong>${esc(state.main.user)}</strong>...</span></div>`;

  let repos;
  try {
    repos = await adapters[state.main.forge].listRepos(state.main);
  } catch (e) {
    app.innerHTML = `<div class="error-box"><h3>Error</h3><p>${esc(e.message)}</p></div>`;
    return;
  }

  if (repos.length === 0) {
    app.innerHTML = `<div class="error-box"><h3>No repositories found</h3><p>Check the ${esc(label)} profile.</p></div>`;
    return;
  }

  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading releases...</span></div>`;

  // Fetching the full release list costs the same as fetching only the latest
  // (one request per repo) and gives all-time download totals, not just the latest release's
  const [allReleases] = await Promise.all([
    Promise.all(repos.map(r => adapters[state.main.forge].listReleases(state.main, r.name))),
    resolveMirrors(repos.map(r => r.name))
  ]);

  const repoData = await Promise.all(repos.map(async (r, i) => {
    const rels = allReleases[i];
    const latestRelease = rels[0] || null;
    let latestParts = [], totalParts = [], mirrorTotal = 0;
    if (rels.length && mirrorsOf(r.name).length) {
      const partsList = await Promise.all(rels.map(rel => mirrorPartsForTag(r.name, rel.tag)));
      latestParts = partsList[0] || [];
      const agg = {};
      partsList.flat().forEach(p => {
        if (!agg[p.label]) agg[p.label] = { label: p.label, forge: p.forge, count: 0 };
        agg[p.label].count += p.count;
      });
      totalParts = Object.values(agg);
      mirrorTotal = partsTotal(totalParts);
    }
    const counts = ENGINES[state.main.forge].counts;
    const mainTotalDl = counts ? rels.reduce((s, rel) => s + (releaseMainDl(rel) || 0), 0) : null;
    const mainLatestDl = latestRelease ? releaseMainDl(latestRelease) : 0;
    return {
      ...r,
      releasesCount: rels.length,
      latestRelease,
      mainDl: mainLatestDl,
      mirrorParts: latestParts,
      latestReleaseDl: (mainLatestDl || 0) + partsTotal(latestParts),
      mainTotalDl,
      totalParts,
      totalDl: (mainTotalDl || 0) + mirrorTotal
    };
  }));

  const privCountAll = repoData.filter(r => r.private).length;

  state.repoCache = {};
  repoData.forEach(r => { state.repoCache[r.name] = r; });

  // Charts of the current view, destroyed before each re-render (scope switch)
  let viewCharts = [];
  const track = c => { viewCharts.push(c); return c; };

  function renderView() {
  viewCharts.forEach(c => c.destroy());
  viewCharts = [];

  // The scope filter applies to EVERYTHING on this page: stats, charts, cards, history
  let vis = privCountAll ? getVisFilter() : 'all';
  const data = vis === 'all' ? repoData : repoData.filter(r => (vis === 'private') === r.private);

  // Global stats (current scope)
  const totalStars = data.reduce((s, r) => s + r.stars, 0);
  const totalForks = data.reduce((s, r) => s + r.forks, 0);
  const totalIssues = data.reduce((s, r) => s + r.issues, 0);
  const totalDl = data.reduce((s, r) => s + r.totalDl, 0);
  const anyMirror = data.some(r => r.totalParts.length > 0);
  const showDl = ENGINES[state.main.forge].counts || anyMirror;
  const reposWithRelease = data.filter(r => r.latestRelease);
  const languages = [...new Set(data.map(r => r.language).filter(Boolean))];

  // Local history snapshot (this browser only) — one series per scope
  const hist = recordHistory(`dash:${state.key}${vis === 'all' ? '' : ':' + vis}`, { dl: totalDl, stars: totalStars });

  // Most recent release across the scoped repos
  let mostRecentRelease = null, mostRecentRepo = null;
  data.forEach(r => {
    if (r.latestRelease) {
      if (!mostRecentRelease || new Date(r.latestRelease.date) > new Date(mostRecentRelease.date)) {
        mostRecentRelease = r.latestRelease;
        mostRecentRepo = r;
      }
    }
  });

  document.getElementById('breadcrumb').innerHTML = `
    ${state.main.forge === 'github' ? `<img class="header-avatar" src="https://github.com/${esc(state.main.user)}.png?size=64" alt="">` : ''}
    <strong>${esc(state.main.user)}</strong>
    <span>·</span>
    <span>${esc(label)}</span>
    <span>·</span>
    <span>${data.length} repos${vis !== 'all' ? ` (${vis})` : ''}</span>
    <a onclick="navigateHome()" style="font-size:12px">(change)</a>
  `;

  let html = '';

  // Global scope selector (shown only when private repos are loaded)
  if (privCountAll) {
    html += `
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:12px;color:var(--text2)">Scope — applies to all stats on this page:</span>
      <select id="visSelect" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;outline:none">
        <option value="all"${vis === 'all' ? ' selected' : ''}>👁 All repos</option>
        <option value="public"${vis === 'public' ? ' selected' : ''}>🌐 Public only</option>
        <option value="private"${vis === 'private' ? ' selected' : ''}>🔒 Private only</option>
      </select>
    </div>`;
  }

  // Release banner
  if (mostRecentRelease) {
    html += `
    <div class="release-banner">
      <div class="release-tag">${esc(mostRecentRelease.tag)}</div>
      <div class="release-info">
        <div class="release-name">${esc(mostRecentRepo.name)} — ${esc(mostRecentRelease.name || mostRecentRelease.tag)}</div>
        <div class="release-meta">
          <span>📅 ${formatDate(mostRecentRelease.date)}</span>
          <span>⏱ ${timeAgo(mostRecentRelease.date)}</span>
          <span>${mostRecentRelease.prerelease ? '⚠️ Pre-release' : '✅ Stable'}</span>
        </div>
      </div>
      ${showDl ? `
      <div class="release-downloads">
        ${formatNumber(mostRecentRepo.latestReleaseDl)}
        <small>downloads (this release)${mostRecentRepo.mirrorParts.length ? ` — ${esc(partsTitle(mostRecentRepo.mainDl, mostRecentRepo.mirrorParts))}` : ''}</small>
      </div>` : ''}
    </div>`;
  }

  // Stats cards
  html += `
  <div class="stats-grid">
    <div class="stat-card"><div class="value">${data.length}</div><div class="label">Repositories</div></div>
    <div class="stat-card"><div class="value">${formatNumber(totalStars)}</div><div class="label">⭐ Total Stars</div></div>
    <div class="stat-card"><div class="value">${formatNumber(totalForks)}</div><div class="label">🔀 Total Forks</div></div>
    <div class="stat-card"><div class="value">${totalIssues}</div><div class="label">🔓 Open Issues${state.main.forge === 'github' ? ' + PRs' : ''}</div></div>
    <div class="stat-card highlight"><div class="value">${reposWithRelease.length}</div><div class="label">📦 Repos with a release</div></div>
    ${showDl ? `<div class="stat-card downloads"><div class="value">${formatNumber(totalDl)}</div><div class="label">⬇️ Downloads (all releases${anyMirror ? ', all sources' : ''})</div></div>` : ''}
    ${languages.length ? `<div class="stat-card"><div class="value">${languages.length}</div><div class="label">🌐 Languages</div></div>` : ''}
  </div>`;

  // Charts
  html += `
  <div class="charts-grid">
    <div class="chart-card"><h3>⭐ Stars per repo (Top 10)</h3><canvas id="chartStars"></canvas></div>
    ${languages.length ? `<div class="chart-card"><h3>🌐 Language breakdown</h3><canvas id="chartLangs"></canvas></div>` : ''}
    ${showDl ? `<div class="chart-card"><h3>⬇️ Downloads per repo</h3><canvas id="chartDownloads"></canvas></div>` : ''}
    <div class="chart-card"><h3>📅 Activity (last updated)</h3><canvas id="chartActivity"></canvas></div>
    ${hist.length >= 2 ? `<div class="chart-card"><h3>📈 Tracked over time (recorded locally on each visit)</h3><canvas id="chartHistory"></canvas></div>` : ''}
  </div>`;

  // Sort bar + repos
  html += `
  <div class="section">
    <div class="section-title">📂 Repositories
      <span style="font-size:11px;color:var(--text2);font-weight:400">(forks excluded${privCountAll ? `, ${privCountAll} private` : ''})</span>
      <span style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-mini" id="exportCsvBtn">⬇ CSV</button>
        <button class="btn btn-mini" id="exportJsonBtn">⬇ JSON</button>
      </span>
    </div>
    ${state.main.forge === 'github' && state.githubAuthOwner && privCountAll === 0 ? `
    <p style="color:var(--text2);font-size:12px;margin-bottom:10px">🔑 Token authenticated, but the API returned no private repositories. If you expected some: a classic token needs the <strong>repo</strong> scope; a fine-grained token needs <strong>Repository access: All repositories</strong> (the default only grants public ones).</p>` : ''}
    <div class="sort-bar">
      <input type="text" id="searchInput" placeholder="Search repositories...">
      <select id="sortSelect">
        <option value="stars">⭐ Stars</option>
        <option value="forks">🔀 Forks</option>
        <option value="updated">📅 Updated</option>
        <option value="name">🔤 Name</option>
        <option value="downloads">⬇️ Downloads</option>
        <option value="issues">🔓 Issues</option>
      </select>
    </div>
    <div class="repo-grid" id="repoGrid"></div>
  </div>`;

  app.innerHTML = html;

  wireExport('exportCsvBtn', 'exportJsonBtn', `forgestats-${state.main.user}-repos`, () =>
    data.map(r => ({
      name: r.name, archived: r.archived, stars: r.stars, forks: r.forks, open_issues: r.issues,
      language: r.language, updated: r.updated, releases: r.releasesCount,
      latest_release: r.latestRelease ? r.latestRelease.tag : null,
      latest_release_downloads: r.latestReleaseDl,
      main_downloads: r.mainTotalDl,
      mirror_downloads: partsTotal(r.totalParts),
      total_downloads: r.totalDl,
      url: r.url
    }))
  );

  function renderRepoCards(list) {
    const grid = document.getElementById('repoGrid');
    grid.innerHTML = list.map(r => `
      <div class="repo-card" onclick="navigateToRepo('${esc(r.name)}')">
        <div class="repo-name">${esc(r.name)}${r.private ? ' <span class="badge-private">🔒 private</span>' : ''}${r.archived ? ' <span class="badge-archived">📦 archived</span>' : ''}${r.template ? ' <span class="badge-template">📐 template</span>' : ''}</div>
        <div class="repo-desc">${r.description ? esc(r.description) : '<em>No description</em>'}</div>
        <div class="repo-meta">
          ${r.language ? `<span><span class="lang-dot" style="background:${LANG_COLORS[r.language] || '#888'}"></span> ${esc(r.language)}</span>` : ''}
          <span>⭐ ${formatNumber(r.stars)}</span>
          <span>🔀 ${r.forks}</span>
          <span>🔓 ${r.issues}</span>
          <span>📅 ${timeAgo(r.pushed || r.updated)}</span>
          ${showDl && r.totalDl > 0 ? `<span title="All releases — ${esc(partsTitle(r.mainTotalDl, r.totalParts))}" style="color:var(--accent4);font-weight:600">⬇️ ${formatNumber(r.totalDl)} total</span>` : ''}
        </div>
        ${r.latestRelease ? `
        <div class="repo-release">
          <span class="tag">${esc(r.latestRelease.tag)}${r.latestRelease.prerelease ? ' <span class="badge-pre">⚠️</span>' : ''}</span>
          <span style="color:var(--text2);font-size:11px">${timeAgo(r.latestRelease.date)}</span>
          ${showDl ? `<span class="dl" ${r.mirrorParts.length ? `title="${esc(partsTitle(r.mainDl, r.mirrorParts))}"` : ''}>⬇️ ${formatNumber(r.latestReleaseDl)} downloads${r.mirrorParts.length ? ' <small style="color:var(--text2);font-weight:400">(+mirrors)</small>' : ''}</span>` : ''}
        </div>` : ''}
      </div>
    `).join('');
  }

  function sortAndFilter() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    let filtered = data.filter(r => r.name.toLowerCase().includes(search) || (r.description || '').toLowerCase().includes(search));
    filtered.sort((a, b) => {
      switch (sort) {
        case 'stars': return b.stars - a.stars;
        case 'forks': return b.forks - a.forks;
        case 'updated': return new Date(b.updated) - new Date(a.updated);
        case 'name': return a.name.localeCompare(b.name);
        case 'downloads': return b.totalDl - a.totalDl;
        case 'issues': return b.issues - a.issues;
      }
    });
    renderRepoCards(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', sortAndFilter);
  document.getElementById('sortSelect').addEventListener('change', sortAndFilter);
  const visSelEl = document.getElementById('visSelect');
  if (visSelEl) visSelEl.addEventListener('change', e => { setVisFilter(e.target.value); renderView(); });
  sortAndFilter();

  Chart.defaults.color = '#8b949e';

  // Stars chart
  const topStars = [...data].sort((a, b) => b.stars - a.stars).slice(0, 10);
  track(new Chart(document.getElementById('chartStars'), {
    type: 'bar',
    data: {
      labels: topStars.map(r => r.name),
      datasets: [{
        data: topStars.map(r => r.stars),
        backgroundColor: '#58a6ff88',
        borderColor: '#58a6ff',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#30363d33' } },
        y: { grid: { display: false } }
      }
    }
  }));

  // Languages chart
  if (languages.length) {
    const langCount = {};
    data.forEach(r => { if (r.language) langCount[r.language] = (langCount[r.language] || 0) + 1; });
    const langEntries = Object.entries(langCount).sort((a, b) => b[1] - a[1]);
    track(new Chart(document.getElementById('chartLangs'), {
      type: 'doughnut',
      data: {
        labels: langEntries.map(e => e[0]),
        datasets: [{
          data: langEntries.map(e => e[1]),
          backgroundColor: langEntries.map(e => LANG_COLORS[e[0]] || '#888'),
          borderColor: '#161b22',
          borderWidth: 2,
        }]
      },
      options: {
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } }
        }
      }
    }));
  }

  // Downloads chart
  if (showDl) {
    const withDl = data.filter(r => r.totalDl > 0).sort((a, b) => b.totalDl - a.totalDl).slice(0, 10);
    track(new Chart(document.getElementById('chartDownloads'), {
      type: 'bar',
      data: {
        labels: withDl.map(r => r.name),
        datasets: [{
          data: withDl.map(r => r.totalDl),
          backgroundColor: '#d2a8ff88',
          borderColor: '#d2a8ff',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#30363d33' } },
          y: { grid: { display: false } }
        }
      }
    }));
  }

  // Activity chart (last updated by month)
  const months = {};
  data.forEach(r => {
    const d = new Date(r.pushed || r.updated);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    months[key] = (months[key] || 0) + 1;
  });
  const sortedMonths = Object.entries(months).sort((a, b) => a[0].localeCompare(b[0]));
  track(new Chart(document.getElementById('chartActivity'), {
    type: 'line',
    data: {
      labels: sortedMonths.map(e => e[0]),
      datasets: [{
        data: sortedMonths.map(e => e[1]),
        borderColor: '#3fb950',
        backgroundColor: '#3fb95022',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#3fb950',
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#30363d33' } },
        y: { grid: { color: '#30363d33' }, beginAtZero: true }
      }
    }
  }));

  // Local history chart
  if (hist.length >= 2) {
    track(historyChart('chartHistory', hist, [
      { key: 'dl', label: 'Downloads', color: '#d2a8ff', axis: 'y' },
      { key: 'stars', label: 'Stars', color: '#58a6ff', axis: 'y1' },
    ]));
  }
  } // end renderView

  renderView();
}

// ---- DETAIL PAGE ----

async function renderRepoDetail(repoName) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading <strong>${esc(repoName)}</strong>...</span></div>`;

  const engine = ENGINES[state.main.forge];
  const adapter = adapters[state.main.forge];
  const label = forgeLabel(state.main);

  let repo, releases, extras, repoErr = null;
  try {
    [repo, releases, extras] = await Promise.all([
      // If the live repo call fails, fall back to the data already loaded by the dashboard
      adapter.getRepo(state.main, repoName).catch(e => { repoErr = e; return state.repoCache[repoName] || null; }),
      adapter.listReleases(state.main, repoName),
      adapter.extras(state.main, repoName),
      resolveMirrors([repoName]),
    ]);
  } catch (e) {
    app.innerHTML = `<div class="error-box"><h3>Error</h3><p>${esc(e.message)}</p></div>`;
    return;
  }

  if (!repo) {
    app.innerHTML = `<div class="error-box"><h3>Error</h3><p>${esc(repoErr ? repoErr.message : 'Repository not found.')}</p></div>`;
    return;
  }

  const { contributors, languages, commitActivity, participation } = extras;

  // Mirror downloads per release tag
  const relParts = {};
  if (releases.length > 0 && mirrorsOf(repoName).length > 0) {
    const partsList = await Promise.all(releases.map(r => mirrorPartsForTag(repoName, r.tag)));
    releases.forEach((r, i) => relParts[r.tag] = partsList[i]);
  }
  const partsOf = r => relParts[r.tag] || [];
  const combinedDl = r => (releaseMainDl(r) || 0) + partsTotal(partsOf(r));

  const anyMirror = releases.some(r => partsOf(r).length > 0);
  const showDl = engine.counts || anyMirror;
  const mainTotal = engine.counts ? releases.reduce((s, r) => s + (releaseMainDl(r) || 0), 0) : null;
  const mirrorTotal = releases.reduce((s, r) => s + partsTotal(partsOf(r)), 0);
  const totalDl = (mainTotal || 0) + mirrorTotal;
  const latestRelease = releases[0] || null;

  // Local history snapshot (this browser only)
  const hist = recordHistory(`repo:${state.key}:${repoName}`, { dl: totalDl, stars: repo.stars });

  document.getElementById('breadcrumb').innerHTML = `
    ${state.main.forge === 'github' ? `<img class="header-avatar" src="https://github.com/${esc(state.main.user)}.png?size=64" alt="">` : ''}
    <a onclick="navigateDash()">${esc(state.main.user)}</a>
    <span>/</span>
    <strong>${esc(repoName)}</strong>
  `;

  let html = '';

  if (repoErr) {
    html += `<p style="color:var(--yellow);font-size:12px;margin-bottom:12px">⚠️ Live repository info unavailable (${esc(repoErr.message)}) — showing data already loaded by the dashboard.</p>`;
  }

  // Header
  html += `
  <div class="detail-header">
    <div class="info">
      <h2>${esc(repo.name)}${repo.private ? ' <span class="badge-private">🔒 private</span>' : ''}${repo.archived ? ' <span class="badge-archived">📦 archived</span>' : ''}${repo.template ? ' <span class="badge-template">📐 template</span>' : ''}</h2>
      <p>${repo.description ? esc(repo.description) : 'No description'}</p>
      ${repo.topics && repo.topics.length ? `<div class="topics">${repo.topics.map(t => `<span class="topic">${esc(t)}</span>`).join('')}</div>` : ''}
      ${repo.homepage ? `<p style="margin-top:8px"><a href="${esc(repo.homepage)}" target="_blank">🌐 ${esc(repo.homepage)}</a></p>` : ''}
    </div>
    <div class="actions">
      <a class="btn" href="${esc(repo.url)}" target="_blank">View on ${esc(label)}</a>
    </div>
  </div>`;

  // Stats
  const repoSize = repo.sizeKB === null ? null : (repo.sizeKB > 1024 ? (repo.sizeKB / 1024).toFixed(1) + ' MB' : repo.sizeKB + ' KB');

  html += `
  <div class="stats-grid">
    <div class="stat-card"><div class="value">${formatNumber(repo.stars)}</div><div class="label">⭐ Stars</div></div>
    <div class="stat-card"><div class="value">${repo.forks}</div><div class="label">🔀 Forks</div></div>
    <div class="stat-card"><div class="value">${repo.issues}</div><div class="label">🔓 Open Issues${state.main.forge === 'github' ? ' + PRs' : ''}</div></div>
    ${repo.watchers !== null ? `<div class="stat-card"><div class="value">${repo.watchers}</div><div class="label">👁 Watchers</div></div>` : ''}
    <div class="stat-card highlight"><div class="value">${releases.length}</div><div class="label">📦 Releases</div></div>
    ${showDl ? `<div class="stat-card downloads"><div class="value">${formatNumber(totalDl)}</div><div class="label">⬇️ Total Downloads${anyMirror ? ' (all sources)' : ''}</div></div>` : ''}
    ${anyMirror ? `<div class="stat-card downloads"><div class="value">${formatNumber(mirrorTotal)}</div><div class="label">⬇️ from mirrors</div></div>` : ''}
    ${repoSize !== null ? `<div class="stat-card"><div class="value">${repoSize}</div><div class="label">💾 Size</div></div>` : ''}
    ${contributors.length ? `<div class="stat-card"><div class="value">${contributors.length}</div><div class="label">👥 Contributors</div></div>` : ''}
  </div>

  <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
    <div class="stat-card"><div class="value" style="font-size:16px">${formatDate(repo.created)}</div><div class="label">📅 Created</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${formatDate(repo.pushed || repo.updated)}</div><div class="label">🔄 Last push</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${repo.license ? esc(repo.license) : 'None'}</div><div class="label">📜 License</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${repo.branch ? esc(repo.branch) : '—'}</div><div class="label">🌿 Default branch</div></div>
  </div>`;

  // Latest release banner
  if (latestRelease) {
    const mainDl = releaseMainDl(latestRelease);
    const parts = partsOf(latestRelease);
    html += `
    <div class="release-banner">
      <div class="release-tag">${esc(latestRelease.tag)}</div>
      <div class="release-info">
        <div class="release-name">${esc(latestRelease.name || latestRelease.tag)}</div>
        <div class="release-meta">
          <span>📅 ${formatDate(latestRelease.date)}</span>
          <span>⏱ ${timeAgo(latestRelease.date)}</span>
          <span>${latestRelease.prerelease ? '⚠️ Pre-release' : '✅ Stable'}</span>
        </div>
      </div>
      ${showDl ? `
      <div class="release-downloads">
        ${formatNumber(combinedDl(latestRelease))}
        <small>downloads (latest release)${parts.length ? ` — ${esc(partsTitle(mainDl, parts))}` : ''}</small>
      </div>` : ''}
    </div>`;
  }

  // Charts
  html += `<div class="charts-grid">`;

  const langEntries = Object.entries(languages || {});
  if (langEntries.length > 0) {
    html += `<div class="chart-card"><h3>🌐 Languages</h3><canvas id="chartLangsDetail"></canvas></div>`;
  }
  if (Array.isArray(commitActivity) && commitActivity.length > 0) {
    html += `<div class="chart-card"><h3 style="display:flex;align-items:center;gap:8px">📊 Commits
      <select id="commitRange" style="margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:11px;border-radius:6px;padding:2px 6px;cursor:pointer">
        <option value="52">last 52 weeks</option>
        <option value="26">last 26 weeks</option>
        <option value="13">last 13 weeks</option>
        <option value="4">last 4 weeks</option>
      </select></h3><canvas id="chartCommits"></canvas></div>`;
  }
  if (releases.length > 0 && showDl) {
    html += `<div class="chart-card"><h3>⬇️ Downloads per release</h3><canvas id="chartReleaseDl"></canvas></div>`;
  }
  if (participation && participation.owner) {
    html += `<div class="chart-card"><h3>👥 Participation (owner vs others)</h3><canvas id="chartParticipation"></canvas></div>`;
  }
  if (showDl && hist.length >= 2) {
    html += `<div class="chart-card"><h3>📈 Tracked over time (recorded locally on each visit)</h3><canvas id="chartHistoryDetail"></canvas></div>`;
  }
  if (releases.length > 0 && showDl) {
    html += `<div class="chart-card" style="grid-column: 1 / -1;"><h3>📈 Asset Downloads per Release</h3><canvas id="chartDlTimeline"></canvas></div>`;
  }

  html += `</div>`;

  // Contributors
  if (contributors.length > 0) {
    html += `
    <div class="section">
      <div class="section-title">👥 Contributors (Top ${Math.min(contributors.length, 20)})</div>
      <div class="contributors-grid">
        ${contributors.slice(0, 20).map(c => `
          ${c.url ? `<a class="contributor" href="${esc(c.url)}" target="_blank">` : `<span class="contributor">`}
            ${c.avatar ? `<img src="${esc(c.avatar)}&s=56" alt="${esc(c.name)}">` : `<span class="initial">${esc((c.name || '?').charAt(0).toUpperCase())}</span>`}
            <span>${esc(c.name)}</span>
            <span style="color:var(--text2);font-size:11px">${c.contributions}</span>
          ${c.url ? `</a>` : `</span>`}
        `).join('')}
      </div>
    </div>`;
  }

  // All releases
  if (releases.length > 0) {
    html += `
    <div class="section">
      <div class="section-title">📦 All releases (${releases.length})
        <span style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-mini" id="exportRelCsvBtn">⬇ CSV</button>
          <button class="btn btn-mini" id="exportRelJsonBtn">⬇ JSON</button>
        </span>
      </div>
      ${!engine.counts && !anyMirror ? `<p style="color:var(--text2);font-size:13px;margin-bottom:10px">${esc(label)} does not expose download counts for release assets.</p>` : ''}
      <div class="releases-list">
        ${releases.map(r => {
          const row = `
            <span class="tag-name">${esc(r.tag)}</span>
            <span class="name">${esc(r.name || r.tag)}${r.prerelease ? ' <span class="badge-pre">⚠️ pre-release</span>' : ''}</span>
            <span class="date">${formatDate(r.date)}</span>
            ${showDl ? `<span class="downloads">⬇️ ${formatNumber(combinedDl(r))}${partsOf(r).length ? ` <small style="color:var(--text2);font-weight:400">(${esc(partsTitle(releaseMainDl(r), partsOf(r)))})</small>` : ''}</span>` : ''}`;
          if (!r.assets.length) return `<div class="release-item">${row}</div>`;
          return `
          <details class="release-wrap">
            <summary><div class="release-item">${row}<span style="color:var(--text2);font-size:11px">📎 ${r.assets.length} assets ▾</span></div></summary>
            <div class="release-assets">
              ${r.assets.map(a => `
                <div class="release-item">
                  <span class="name" style="font-size:13px">${esc(a.name)}</span>
                  ${a.size !== null ? `<span class="date">${(a.size / 1048576).toFixed(1)} MB</span>` : ''}
                  <span class="downloads">⬇️ ${a.downloads === null ? 'n/a' : formatNumber(a.downloads)}</span>
                </div>
              `).join('')}
            </div>
          </details>`;
        }).join('')}
      </div>
    </div>`;
  }

  app.innerHTML = html;

  wireExport('exportRelCsvBtn', 'exportRelJsonBtn', `forgestats-${state.main.user}-${repoName}-releases`, () =>
    releases.map(r => ({
      tag: r.tag, name: r.name, date: r.date, prerelease: r.prerelease,
      main_downloads: releaseMainDl(r),
      mirror_downloads: partsTotal(partsOf(r)),
      mirrors: partsOf(r).map(p => `${p.label}: ${p.count}`).join('; '),
      total_downloads: combinedDl(r)
    }))
  );

  // Charts rendering
  if (langEntries.length > 0) {
    const totalBytes = langEntries.reduce((s, e) => s + e[1], 0);
    new Chart(document.getElementById('chartLangsDetail'), {
      type: 'doughnut',
      data: {
        labels: langEntries.map(e => `${e[0]} (${(e[1]/totalBytes*100).toFixed(1)}%)`),
        datasets: [{
          data: langEntries.map(e => e[1]),
          backgroundColor: langEntries.map(e => LANG_COLORS[e[0]] || '#888'),
          borderColor: '#161b22',
          borderWidth: 2,
        }]
      },
      options: {
        plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } }
      }
    });
  }

  if (Array.isArray(commitActivity) && commitActivity.length > 0) {
    // The GitHub API returns a fixed 52-week window; the selector filters it client-side
    let commitsChart = null;
    const renderCommits = (n) => {
      const weeks = commitActivity.slice(-n);
      const labels = weeks.map(w => {
        const d = new Date(w.week * 1000);
        return `${d.getDate()}/${d.getMonth()+1}`;
      });
      const data = weeks.map(w => w.total);
      if (commitsChart) {
        commitsChart.data.labels = labels;
        commitsChart.data.datasets[0].data = data;
        commitsChart.update();
        return;
      }
      commitsChart = new Chart(document.getElementById('chartCommits'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: '#58a6ff66',
            borderColor: '#58a6ff',
            borderWidth: 1,
            borderRadius: 2,
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 12, font: { size: 10 } } },
            y: { grid: { color: '#30363d33' }, beginAtZero: true }
          }
        }
      });
    };
    renderCommits(52);
    document.getElementById('commitRange').addEventListener('change', e => renderCommits(parseInt(e.target.value, 10)));
  }

  if (releases.length > 0 && showDl) {
    const releasesReversed = [...releases].reverse().slice(-20);
    const dlDatasets = [];
    if (engine.counts) {
      dlDatasets.push({
        label: label,
        data: releasesReversed.map(r => releaseMainDl(r) || 0),
        backgroundColor: forgeColor(state.main) + '66',
        borderColor: forgeColor(state.main),
        borderWidth: 1,
        borderRadius: 4,
      });
    }
    // One stacked dataset per mirror source present (keyed by label: host-aware)
    const mirrorLabels = [...new Set(releases.flatMap(r => partsOf(r).map(p => p.label)))];
    mirrorLabels.forEach(ml => {
      const forge = (releases.flatMap(r => partsOf(r)).find(p => p.label === ml) || {}).forge;
      const color = ENGINES[forge] ? ENGINES[forge].color : '#888';
      dlDatasets.push({
        label: ml,
        data: releasesReversed.map(r => (partsOf(r).find(p => p.label === ml) || {}).count || 0),
        backgroundColor: color + '66',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 4,
      });
    });
    new Chart(document.getElementById('chartReleaseDl'), {
      type: 'bar',
      data: {
        labels: releasesReversed.map(r => r.tag),
        datasets: dlDatasets
      },
      options: {
        plugins: { legend: { display: dlDatasets.length > 1, labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { stacked: true, grid: { color: '#30363d33' }, beginAtZero: true }
        }
      }
    });
  }

  // Local history chart
  if (showDl && hist.length >= 2) {
    historyChart('chartHistoryDetail', hist, [
      { key: 'dl', label: 'Total downloads', color: '#d2a8ff', axis: 'y' },
      { key: 'stars', label: 'Stars', color: '#58a6ff', axis: 'y1' },
    ]);
  }

  // Asset downloads per release (line chart)
  if (releases.length > 0 && showDl) {
    const lineColors = ['#58a6ff','#3fb950','#FA4016','#d2a8ff','#e3b341','#ff7b72','#79c0ff','#7ee787','#ffa657','#bc8cff','#56d4dd','#f2cc60'];
    const sortedReleases = [...releases].reverse();
    const labels = sortedReleases.map(r => r.tag);

    // Normalize asset names to group across releases
    function normalizeAssetName(name) {
      return name
        .replace(/[-_]?v?\d+\.\d+(\.\d+)*/g, '')
        .replace(/--+/g, '-').replace(/__+/g, '_')
        .replace(/^[-_]+|[-_]+$/g, '');
    }

    const datasets = [];

    if (engine.counts) {
      const normalizedSet = new Set();
      sortedReleases.forEach(r => countableAssets(r).forEach(a => normalizedSet.add(normalizeAssetName(a.name))));
      const assetGroups = [...normalizedSet].filter(n => n.length > 0);

      assetGroups.forEach((group, i) => {
        const color = lineColors[i % lineColors.length];
        datasets.push({
          label: group,
          data: sortedReleases.map(r => {
            return countableAssets(r)
              .filter(a => normalizeAssetName(a.name) === group)
              .reduce((sum, a) => sum + (a.downloads || 0), 0);
          }),
          borderColor: color,
          backgroundColor: color + '22',
          pointBackgroundColor: color,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
          tension: 0.2,
          fill: false,
        });
      });
    }

    // One line per mirror source (per-release totals)
    const mirrorLabels = [...new Set(releases.flatMap(r => partsOf(r).map(p => p.label)))];
    mirrorLabels.forEach(ml => {
      const forge = (releases.flatMap(r => partsOf(r)).find(p => p.label === ml) || {}).forge;
      const color = ENGINES[forge] ? ENGINES[forge].color : '#888';
      datasets.push({
        label: ml,
        data: sortedReleases.map(r => (partsOf(r).find(p => p.label === ml) || {}).count || 0),
        borderColor: color,
        backgroundColor: color + '22',
        pointBackgroundColor: color,
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        tension: 0.2,
        fill: false,
      });
    });

    // Total line (all sources)
    datasets.push({
      label: 'Total',
      data: sortedReleases.map(r => combinedDl(r)),
      borderColor: '#e6edf3',
      backgroundColor: '#e6edf322',
      pointBackgroundColor: '#e6edf3',
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2.5,
      borderDash: [6, 3],
      tension: 0.2,
      fill: false,
    });

    new Chart(document.getElementById('chartDlTimeline'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 11 } } },
          tooltip: {
            filter: ctx => ctx.parsed.y > 0,
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} DL`
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#30363d22' },
            ticks: { font: { size: 10 } },
            title: { display: true, text: 'Release Tags', color: '#8b949e', font: { size: 11 } }
          },
          y: {
            grid: { color: '#30363d33' },
            beginAtZero: true,
            title: { display: true, text: 'Downloads', color: '#8b949e', font: { size: 11 } }
          }
        }
      }
    });
  }

  if (participation && participation.owner) {
    const labels = participation.owner.map((_, i) => `W${i+1}`);
    new Chart(document.getElementById('chartParticipation'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Owner',
            data: participation.owner,
            borderColor: '#58a6ff',
            backgroundColor: '#58a6ff22',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
          },
          {
            label: 'Others',
            data: participation.all.map((v, i) => v - participation.owner[i]),
            borderColor: '#3fb950',
            backgroundColor: '#3fb95022',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
          }
        ]
      },
      options: {
        plugins: { legend: { labels: { boxWidth: 12, padding: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
          y: { grid: { color: '#30363d33' }, beginAtZero: true }
        }
      }
    });
  }
}

// ---- LANDING ----

// Accepts: a profile or repository URL from a known forge (github.com, gitlab.com,
// codeberg.org, sourceforge.net), a self-hosted URL prefixed with its engine
// ("gitlab:https://host/user" or "gitea:https://host/user"), "forge:user",
// or a bare username (assumed GitHub). Returns {forge, host?, user, repo?}.
function parseProfile(input) {
  input = (input || '').trim();
  if (!input) return null;

  // Self-hosted instance: engine prefix + full URL
  let m = input.match(/^(gitlab|gitea|forgejo):(https?:\/\/.+)$/i);
  if (m) {
    const engine = m[1].toLowerCase() === 'gitlab' ? 'gitlab' : 'gitea';
    try {
      const u = new URL(m[2]);
      const segs = u.pathname.split('/').filter(Boolean);
      if (!segs.length) return null;
      return { forge: engine, host: u.host, user: segs[0], repo: segs[1] || null };
    } catch { return null; }
  }

  // Known hosts (profile or repository URL)
  const urlPatterns = [
    { forge: 'github',      host: null,           re: /github\.com\/([A-Za-z0-9-]+)(?:\/([A-Za-z0-9_.-]+))?/i },
    { forge: 'gitlab',      host: 'gitlab.com',   re: /gitlab\.com\/([A-Za-z0-9_.-]+)(?:\/([A-Za-z0-9_.-]+))?/i },
    { forge: 'gitea',       host: 'codeberg.org', re: /codeberg\.org\/([A-Za-z0-9_.-]+)(?:\/([A-Za-z0-9_.-]+))?/i },
    { forge: 'sourceforge', host: null,           re: /sourceforge\.net\/u\/([A-Za-z0-9_.-]+)/i },
  ];
  for (const p of urlPatterns) {
    const mm = input.match(p.re);
    if (mm) {
      const ref = { forge: p.forge, user: mm[1], repo: mm[2] || null };
      if (p.host) ref.host = p.host;
      return ref;
    }
  }

  // forge:user shorthand (canonical hosts)
  const prefixed = input.match(/^(github|gitlab|codeberg|sourceforge):([A-Za-z0-9_.-]+)$/i);
  if (prefixed) {
    const f = prefixed[1].toLowerCase();
    if (f === 'codeberg') return { forge: 'gitea', host: 'codeberg.org', user: prefixed[2] };
    if (f === 'gitlab') return { forge: 'gitlab', host: 'gitlab.com', user: prefixed[2] };
    return { forge: f, user: prefixed[2] };
  }

  // Bare username => GitHub
  const clean = input.replace(/^@/, '');
  if (/^[A-Za-z0-9-]+$/.test(clean)) return { forge: 'github', user: clean };
  return null;
}

  document.getElementById('breadcrumb').innerHTML = '';
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="landing">
    <h2>📊 ForgeStats</h2>
    <p>Repository, release and download stats for any account on a software forge — GitHub, GitLab, Codeberg or self-hosted instances — with download counts from mirrors (GitHub, Codeberg/Gitea, SourceForge) automatically detected and added. Projects are matched across forges by name.</p>
    <div class="landing-form">
      <label>Main profile or repository <span class="req">required</span></label>
      <input type="text" id="mainInput" placeholder="https://github.com/username — profile or repo link (gitlab.com, codeberg.org too)">
      <label>Mirror profiles <span class="opt">optional — comma separated, adds their download counts</span></label>
      <input type="text" id="mirrorsInput" placeholder="https://sourceforge.net/u/username/profile, https://codeberg.org/username">
      <label>GitHub token <span class="opt">optional — only used for github.com calls</span></label>
      <input type="password" id="tokenInput" placeholder="ghp_... or github_pat_..." autocomplete="off">
      <button class="btn btn-primary" id="goBtn">View stats</button>
      <p class="landing-error" id="landingError"></p>
      <p class="landing-note">🔒 <strong>Token security:</strong> this page has no backend. Your token is stored only in this browser (localStorage) and sent only to <code>api.github.com</code> — never anywhere else. It never appears in the URL. Clear the field and submit again to remove it.</p>
      <p class="landing-note">Without a token, GitHub allows 60 API requests/hour (responses are cached for 30 min). With a token: 5,000/hour — and if the token belongs to the GitHub profile you enter, your <strong>private repos</strong> are included too.</p>
      <details class="landing-note">
        <summary style="cursor:pointer">🔧 <strong>How to create a token</strong> (fine-grained vs classic)</summary>
        <ul style="margin:8px 0 0 18px;display:flex;flex-direction:column;gap:6px">
          <li><strong>Fine-grained (recommended, truly read-only)</strong> — <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">create one</a>. For the rate limit alone, the defaults are fine. To include your private repos: <em>Repository access → All repositories</em> (the default only grants public ones) and <em>Permissions → Contents: Read-only</em> (needed to read releases; Metadata is added automatically).</li>
          <li><strong>Classic</strong> — <a href="https://github.com/settings/tokens/new?description=ForgeStats" target="_blank">create one</a>. No scope needed for public repos (rate limit boost only). To include your private repos: check the <em>repo</em> scope. ⚠️ The classic <em>repo</em> scope also grants <em>write</em> access — ForgeStats never writes anything, but prefer fine-grained if you can.</li>
        </ul>
      </details>
      <p class="landing-note">Self-hosted instances: prefix the URL with its engine — <code>gitea:https://git.example.com/username</code> or <code>gitlab:https://gitlab.example.com/username</code>.</p>
      <p class="landing-note">Each visit records a local snapshot of the numbers (in this browser only) — revisit over time and evolution charts build up automatically.</p>
      <p class="landing-note">Notes: GitLab does not expose download counts (its releases are listed without numbers, and it cannot be a mirror). SourceForge can only be used as a mirror.</p>
    </div>
  </div>`;
  document.getElementById('goBtn').addEventListener('click', submitLanding);
  app.querySelectorAll('input').forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') submitLanding(); })
  );
}

function submitLanding() {
  const err = document.getElementById('landingError');
  const main = parseProfile(document.getElementById('mainInput').value);
  if (!main) {
    err.textContent = 'Please enter a valid main profile (link or username). For self-hosted instances, prefix with the engine: gitea:https://host/user or gitlab:https://host/user.';
    return;
  }
  if (!ENGINES[main.forge].main) {
    err.textContent = `${forgeLabel(main)} can only be used as a mirror.`;
    return;
  }
  const mirrorInputs = document.getElementById('mirrorsInput').value.split(/[,\s]+/).filter(Boolean);
  const mirrors = [];
  for (const mi of mirrorInputs) {
    const p = parseProfile(mi);
    if (!p) { err.textContent = `Unrecognized mirror profile: "${mi}"`; return; }
    if (!ENGINES[p.forge].mirror) {
      err.textContent = `${forgeLabel(p)} cannot be used as a mirror (no download counts).`;
      return;
    }
    if (p.forge === main.forge && (p.host || '') === (main.host || '') && p.user.toLowerCase() === main.user.toLowerCase()) continue;
    mirrors.push(p);
  }
  const token = document.getElementById('tokenInput').value.trim();
  try { token ? localStorage.setItem('fgs_token', token) : localStorage.removeItem('fgs_token'); } catch {}
  let hash = `main=${encodeURIComponent(refString(main))}`;
  if (mirrors.length) hash += `&mirrors=${encodeURIComponent(mirrors.map(refString).join(','))}`;
  if (main.repo) hash += `&repo=${encodeURIComponent(main.repo)}`;
  window.location.hash = hash;
}

// ---- NAVIGATION (shareable hash: #main=forge:user&mirrors=forge:user,...&repo=name) ----

function refString(p) {
  switch (p.forge) {
    case 'github': return `github:${p.user}`;
    case 'sourceforge': return `sourceforge:${p.user}`;
    case 'gitlab': return p.host === 'gitlab.com' ? `gitlab:${p.user}` : `gitlab@${p.host}:${p.user}`;
    case 'gitea': return p.host === 'codeberg.org' ? `codeberg:${p.user}` : `gitea@${p.host}:${p.user}`;
  }
}

function parseRef(s) {
  if (!s) return null;
  let m = s.match(/^(gitea|gitlab)@([A-Za-z0-9_.:-]+):([A-Za-z0-9_.-]+)$/i);
  if (m) return { forge: m[1].toLowerCase(), host: m[2], user: m[3] };
  m = s.match(/^(github|gitlab|codeberg|sourceforge):([A-Za-z0-9_.-]+)$/i);
  if (!m) return null;
  const f = m[1].toLowerCase();
  if (f === 'codeberg') return { forge: 'gitea', host: 'codeberg.org', user: m[2] };
  if (f === 'gitlab') return { forge: 'gitlab', host: 'gitlab.com', user: m[2] };
  return { forge: f, user: m[2] };
}

function baseHash() {
  let h = `main=${encodeURIComponent(refString(state.main))}`;
  if (state.mirrors.length) {
    h += `&mirrors=${encodeURIComponent(state.mirrors.map(refString).join(','))}`;
  }
  return h;
}

function navigateHome() { window.location.hash = ''; }
function navigateDash() { window.location.hash = baseHash(); }
function navigateToRepo(name) { window.location.hash = `${baseHash()}&repo=${encodeURIComponent(name)}`; }

function handleRoute() {
  const p = new URLSearchParams(window.location.hash.slice(1));
  const main = parseRef(p.get('main'));
  if (!main || !ENGINES[main.forge] || !ENGINES[main.forge].main) { renderLanding(); return; }

  const mirrors = (p.get('mirrors') || '').split(',').map(parseRef)
    .filter(m => m && ENGINES[m.forge] && ENGINES[m.forge].mirror);

  const key = `${refString(main)}|${mirrors.map(refString).join(',')}`;
  if (key !== state.key) {
    state.main = main;
    state.mirrors = mirrors;
    state.key = key;
  }

  const repo = p.get('repo');
  if (repo) renderRepoDetail(repo); else renderDashboard();
}

window.addEventListener('hashchange', handleRoute);

// Init
handleRoute();
</script>
