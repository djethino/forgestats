<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeStats — repo & release stats across forges</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #f78166;
  --accent4: #d2a8ff;
  --yellow: #e3b341;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

header .container {
  display: flex;
  align-items: center;
  gap: 16px;
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

header h1 svg { fill: var(--text); }

.header-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
  font-size: 14px;
}

.breadcrumb a { cursor: pointer; }

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
}

.rate-limit { font-size: 12px; color: var(--text2); }

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Stats cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.stat-card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}

.stat-card .label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-card.highlight {
  border-color: var(--accent2);
  background: linear-gradient(135deg, rgba(63, 185, 80, 0.08), transparent);
}

.stat-card.highlight .value { color: var(--accent2); }

.stat-card.downloads {
  border-color: var(--accent4);
  background: linear-gradient(135deg, rgba(210, 168, 255, 0.08), transparent);
}

.stat-card.downloads .value { color: var(--accent4); }

/* Section */
.section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}

/* Release banner */
.release-banner {
  background: linear-gradient(135deg, rgba(63, 185, 80, 0.1), rgba(88, 166, 255, 0.05));
  border: 1px solid var(--accent2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.release-banner .release-tag {
  background: var(--accent2);
  color: #000;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 16px;
  white-space: nowrap;
}

.release-banner .release-info { flex: 1; min-width: 200px; }

.release-banner .release-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.release-banner .release-meta {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.release-banner .release-downloads {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent4);
  text-align: right;
  white-space: nowrap;
}

.release-banner .release-downloads small {
  display: block;
  font-size: 11px;
  color: var(--text2);
  font-weight: 400;
}

/* Repo grid */
.repo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 12px;
}

.repo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.repo-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.repo-card .repo-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}

.repo-card .repo-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.4;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.repo-card .repo-meta {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--text2);
  flex-wrap: wrap;
}

.repo-card .repo-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.repo-card .repo-release {
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.repo-card .repo-release .tag {
  color: var(--accent2);
  font-weight: 600;
}

.repo-card .repo-release .dl {
  color: var(--accent4);
  font-weight: 600;
}

.lang-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

/* Detail page */
.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.detail-header .info { flex: 1; min-width: 250px; }
.detail-header .info h2 { font-size: 24px; margin-bottom: 6px; }
.detail-header .info p { color: var(--text2); font-size: 14px; line-height: 1.5; }

.detail-header .actions {
  display: flex;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover { background: var(--surface2); text-decoration: none; }

.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.chart-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text2);
}

/* Releases table */
.releases-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.release-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.release-item .tag-name {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  white-space: nowrap;
}

.release-item .name { font-weight: 500; flex: 1; min-width: 120px; }

.release-item .date { color: var(--text2); font-size: 12px; white-space: nowrap; }

.release-item .downloads {
  color: var(--accent4);
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
}

/* Contributors */
.contributors-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.contributor {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px 4px 4px;
  font-size: 13px;
  color: var(--text);
}

.contributor img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.contributor .initial {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--accent);
}

/* Topics */
.topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

.topic {
  background: rgba(88, 166, 255, 0.1);
  color: var(--accent);
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
}

/* Error */
.error-box {
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.4);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  color: var(--accent3);
}

/* Sort bar */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.sort-bar select, .sort-bar input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
}

.sort-bar input { flex: 1; min-width: 180px; }
.sort-bar select { cursor: pointer; }

/* Landing */
.landing { max-width: 560px; margin: 40px auto; }
.landing h2 { margin-bottom: 8px; }
.landing > p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

.landing-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.landing-form label { font-size: 13px; font-weight: 600; margin-top: 10px; }
.landing-form label .req { color: var(--accent3); font-weight: 400; font-size: 11px; }
.landing-form label .opt { color: var(--text2); font-weight: 400; font-size: 11px; }

.landing-form input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}

.landing-form input:focus { border-color: var(--accent); }

.btn-primary {
  justify-content: center;
  background: var(--accent2);
  border-color: var(--accent2);
  color: #000;
  font-weight: 600;
  margin-top: 16px;
}

.btn-primary:hover { background: #4cc961; }

.landing-error { color: var(--accent3); font-size: 13px; min-height: 18px; }

.landing-note { color: var(--text2); font-size: 12px; line-height: 1.5; margin-top: 4px; }
.landing-note code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

/* Responsive */
@media (max-width: 600px) {
  .repo-grid { grid-template-columns: 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .release-banner { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1 onclick="navigateHome()" style="cursor:pointer" title="Home">
      <svg height="24" width="24" viewBox="0 0 24 24"><path d="M12 2 3 7v6c0 5 3.8 8.4 9 9 5.2-.6 9-4 9-9V7l-9-5zm0 2.2 7 3.9v4.9c0 4-3 6.7-7 7.3-4-.6-7-3.3-7-7.3V8.1l7-3.9z"/><path d="M8 11h8v2H8zm2 3h4v2h-4zm-1-6h6v2H9z"/></svg>
      ForgeStats
    </h1>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="header-right">
      <span class="rate-limit" id="rateLimit"></span>
    </div>
  </div>
</header>

<main class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>
</main>

<script>
const LANG_COLORS = {"JavaScript":"#f1e05a","TypeScript":"#3178c6","Python":"#3572A5","Java":"#b07219","C++":"#f34b7d","C#":"#178600","C":"#555555","Go":"#00ADD8","Rust":"#dea584","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Vue":"#41b883","Svelte":"#ff3e00","Lua":"#000080","R":"#198CE7","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Zig":"#ec915c","Nim":"#ffc200","GDScript":"#355570","GLSL":"#5686a5","HLSL":"#aace60"};

// ---- FORGES ----
// main: can be the primary profile / mirror: can contribute download counts / counts: tracks downloads
const FORGES = {
  github:      { label: 'GitHub',      color: '#d2a8ff', main: true,  mirror: true,  counts: true  },
  gitlab:      { label: 'GitLab',      color: '#fc6d26', main: true,  mirror: false, counts: false },
  codeberg:    { label: 'Codeberg',    color: '#2185d0', main: true,  mirror: true,  counts: true  },
  sourceforge: { label: 'SourceForge', color: '#ff6600', main: false, mirror: true,  counts: true  },
};

// ---- STATE (populated from the URL: #main=forge:user&mirrors=forge:user,forge:user&repo=name) ----
const state = {
  main: null,        // {forge, user}
  mirrors: [],       // [{forge, user, names, map: {repoName -> target|null}, _rels: {}}]
  mirrorsKey: '',
};

// localStorage cache (30 min): stretches anonymous API rate limits
const CACHE_TTL = 30 * 60 * 1000;

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('fgs:' + key);
    if (!raw) return null;
    const { t, v } = JSON.parse(raw);
    if (Date.now() - t > CACHE_TTL) return null;
    return v;
  } catch { return null; }
}

function cacheSet(key, v) {
  try { localStorage.setItem('fgs:' + key, JSON.stringify({ t: Date.now(), v })); } catch {}
}

// Optional GitHub token, stored only in the browser (never in the URL or the code)
function getToken() {
  try { return localStorage.getItem('fgs_token') || ''; } catch { return ''; }
}

// Generic cached JSON fetch. GitHub calls get auth headers + rate-limit display, and skip
// the cache when a token is present (no private data written to localStorage, never stale)
async function apiFetch(url, isGitHub = false) {
  const useCache = !(isGitHub && getToken());
  if (useCache) {
    const cached = cacheGet(url);
    if (cached !== null) return cached;
  }
  const opts = {};
  if (isGitHub) {
    opts.headers = { 'Accept': 'application/vnd.github.v3+json' };
    const token = getToken();
    if (token) opts.headers['Authorization'] = `token ${token}`;
  }
  const resp = await fetch(url, opts);
  if (isGitHub) {
    const remaining = resp.headers.get('X-RateLimit-Remaining');
    const limit = resp.headers.get('X-RateLimit-Limit');
    if (remaining !== null) {
      document.getElementById('rateLimit').textContent = `GitHub API: ${remaining}/${limit}`;
    }
  }
  if (!resp.ok) throw new Error(`API ${resp.status}: ${resp.statusText} (${new URL(url).hostname})`);
  const data = await resp.json();
  if (useCache) cacheSet(url, data);
  return data;
}

// ---- NORMALIZED MODEL ----
// repo:    {name, description, language, stars, forks, issues, watchers, updated, pushed, created,
//           url, homepage, topics, private, sizeKB, branch, license, fork}
// release: {tag, name, date, prerelease, assets: [{name, size, downloads}]}  (downloads: null = not tracked)

function isHashAsset(name) {
  return /(\.sha256(sum)?(\.txt)?$|^sha256sums?(\.txt)?$)/i.test(name);
}

function countableAssets(release) {
  return (release && release.assets ? release.assets : []).filter(a => !isHashAsset(a.name));
}

// Main-forge downloads of a release; null when the forge doesn't track them (GitLab)
function releaseMainDl(release) {
  if (!release) return 0;
  if (!FORGES[state.main.forge].counts) return null;
  return countableAssets(release).reduce((sum, a) => sum + (a.downloads || 0), 0);
}

// ---- ADAPTERS ----

const adapters = {

  github: {
    async listRepos(user) {
      // If the provided token belongs to the requested profile, include private repos
      let baseUrl = `https://api.github.com/users/${user}/repos?type=public`;
      if (getToken()) {
        try {
          const me = await apiFetch('https://api.github.com/user', true);
          if (me.login && me.login.toLowerCase() === user.toLowerCase()) {
            baseUrl = 'https://api.github.com/user/repos?affiliation=owner';
          }
        } catch {}
      }
      let page = 1, repos = [];
      while (true) {
        const batch = await apiFetch(`${baseUrl}&per_page=100&page=${page}`, true);
        repos = repos.concat(batch);
        if (batch.length < 100) break;
        page++;
      }
      return repos.filter(r => !r.fork).map(this.normRepo);
    },
    normRepo(r) {
      return {
        name: r.name, description: r.description, language: r.language,
        stars: r.stargazers_count, forks: r.forks_count, issues: r.open_issues_count,
        watchers: r.subscribers_count ?? null, updated: r.updated_at, pushed: r.pushed_at || r.updated_at,
        created: r.created_at, url: r.html_url, homepage: r.homepage, topics: r.topics || [],
        private: !!r.private, sizeKB: r.size, branch: r.default_branch,
        license: r.license ? r.license.spdx_id : null, fork: r.fork
      };
    },
    async getRepo(user, name) {
      return this.normRepo(await apiFetch(`https://api.github.com/repos/${user}/${name}`, true));
    },
    normRelease(r) {
      return {
        tag: r.tag_name, name: r.name, date: r.published_at, prerelease: r.prerelease,
        assets: (r.assets || []).map(a => ({ name: a.name, size: a.size, downloads: a.download_count }))
      };
    },
    async listReleases(user, name) {
      try {
        const rels = await apiFetch(`https://api.github.com/repos/${user}/${name}/releases?per_page=100`, true);
        return rels.map(this.normRelease);
      } catch { return []; }
    },
    async latestRelease(user, name) {
      try {
        return this.normRelease(await apiFetch(`https://api.github.com/repos/${user}/${name}/releases/latest`, true));
      } catch { return null; }
    },
    async extras(user, name) {
      const [contributors, languages, commitActivity, participation] = await Promise.all([
        apiFetch(`https://api.github.com/repos/${user}/${name}/contributors?per_page=20`, true).catch(() => []),
        apiFetch(`https://api.github.com/repos/${user}/${name}/languages`, true).catch(() => ({})),
        apiFetch(`https://api.github.com/repos/${user}/${name}/stats/commit_activity`, true).catch(() => []),
        apiFetch(`https://api.github.com/repos/${user}/${name}/stats/participation`, true).catch(() => null),
      ]);
      return {
        contributors: (Array.isArray(contributors) ? contributors : []).map(c => ({
          name: c.login, contributions: c.contributions, avatar: c.avatar_url, url: c.html_url
        })),
        languages, commitActivity, participation
      };
    },
  },

  gitlab: {
    async listRepos(user) {
      let projects = await this.pagedProjects(`https://gitlab.com/api/v4/users/${encodeURIComponent(user)}/projects`).catch(() => []);
      if (projects.length === 0) {
        // The profile may be a group rather than a user
        projects = await this.pagedProjects(`https://gitlab.com/api/v4/groups/${encodeURIComponent(user)}/projects`).catch(() => []);
      }
      return projects.filter(p => !p.forked_from_project).map(this.normRepo);
    },
    async pagedProjects(baseUrl) {
      let page = 1, all = [];
      while (true) {
        const batch = await apiFetch(`${baseUrl}?per_page=100&page=${page}`);
        all = all.concat(batch);
        if (batch.length < 100) break;
        page++;
      }
      return all;
    },
    normRepo(p) {
      return {
        name: p.path, description: p.description, language: null,
        stars: p.star_count, forks: p.forks_count, issues: p.open_issues_count ?? 0,
        watchers: null, updated: p.last_activity_at, pushed: p.last_activity_at,
        created: p.created_at, url: p.web_url, homepage: null, topics: p.topics || [],
        private: p.visibility ? p.visibility !== 'public' : false, sizeKB: null,
        branch: p.default_branch, license: p.license ? (p.license.nickname || p.license.key) : null,
        fork: !!p.forked_from_project
      };
    },
    projectPath(user, name) { return encodeURIComponent(`${user}/${name}`); },
    async getRepo(user, name) {
      const p = await apiFetch(`https://gitlab.com/api/v4/projects/${this.projectPath(user, name)}?license=true`);
      return this.normRepo(p);
    },
    normRelease(r) {
      return {
        tag: r.tag_name, name: r.name, date: r.released_at, prerelease: !!r.upcoming_release,
        // GitLab does not track download counts on release assets
        assets: ((r.assets && r.assets.links) || []).map(l => ({ name: l.name, size: null, downloads: null }))
      };
    },
    async listReleases(user, name) {
      try {
        const rels = await apiFetch(`https://gitlab.com/api/v4/projects/${this.projectPath(user, name)}/releases?per_page=100`);
        return rels.map(r => this.normRelease(r));
      } catch { return []; }
    },
    async latestRelease(user, name) {
      const rels = await this.listReleases(user, name);
      return rels[0] || null;
    },
    async extras(user, name) {
      const path = this.projectPath(user, name);
      const [contributors, languages] = await Promise.all([
        apiFetch(`https://gitlab.com/api/v4/projects/${path}/repository/contributors?per_page=20&order_by=commits&sort=desc`).catch(() => []),
        apiFetch(`https://gitlab.com/api/v4/projects/${path}/languages`).catch(() => ({})),
      ]);
      return {
        contributors: (Array.isArray(contributors) ? contributors : []).map(c => ({
          name: c.name, contributions: c.commits, avatar: null, url: null
        })),
        languages, commitActivity: [], participation: null
      };
    },
  },

  codeberg: {
    apiBase: 'https://codeberg.org/api/v1',
    async listRepos(user) {
      let repos = await this.pagedRepos(`${this.apiBase}/users/${encodeURIComponent(user)}/repos`).catch(() => []);
      if (repos.length === 0) {
        repos = await this.pagedRepos(`${this.apiBase}/orgs/${encodeURIComponent(user)}/repos`).catch(() => []);
      }
      return repos.filter(r => !r.fork).map(this.normRepo);
    },
    async pagedRepos(baseUrl) {
      let page = 1, all = [];
      while (true) {
        const batch = await apiFetch(`${baseUrl}?limit=50&page=${page}`);
        all = all.concat(batch);
        if (batch.length < 50) break;
        page++;
      }
      return all;
    },
    normRepo(r) {
      return {
        name: r.name, description: r.description, language: r.language || null,
        stars: r.stars_count, forks: r.forks_count, issues: r.open_issues_count,
        watchers: r.watchers_count ?? null, updated: r.updated_at, pushed: r.updated_at,
        created: r.created_at, url: r.html_url, homepage: r.website || null, topics: [],
        private: !!r.private, sizeKB: r.size, branch: r.default_branch,
        license: null, fork: r.fork
      };
    },
    async getRepo(user, name) {
      return this.normRepo(await apiFetch(`${this.apiBase}/repos/${user}/${name}`));
    },
    normRelease(r) {
      return {
        tag: r.tag_name, name: r.name, date: r.published_at, prerelease: r.prerelease,
        assets: (r.assets || []).map(a => ({ name: a.name, size: a.size, downloads: a.download_count }))
      };
    },
    async listReleases(user, name) {
      try {
        let page = 1, all = [];
        while (true) {
          const batch = await apiFetch(`${this.apiBase}/repos/${user}/${name}/releases?limit=50&page=${page}`);
          all = all.concat(batch);
          if (batch.length < 50) break;
          page++;
        }
        return all.map(this.normRelease);
      } catch { return []; }
    },
    async latestRelease(user, name) {
      try {
        return this.normRelease(await apiFetch(`${this.apiBase}/repos/${user}/${name}/releases/latest`));
      } catch { return null; }
    },
    async extras(user, name) {
      const languages = await apiFetch(`${this.apiBase}/repos/${user}/${name}/languages`).catch(() => ({}));
      return { contributors: [], languages, commitActivity: [], participation: null };
    },
  },
};

// ---- SOURCEFORGE (mirror only) ----

function normalizeName(s) {
  return s.toLowerCase().replace(/[^a-z0-9]/g, '');
}

// SourceForge projects of a user via the Allura REST API (CORS allowed)
async function fetchSfProjects(sfUser) {
  const key = `sfprofile:${sfUser}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    const resp = await fetch(`https://sourceforge.net/rest/u/${encodeURIComponent(sfUser)}/profile`);
    if (!resp.ok) return [];
    const data = await resp.json();
    const projects = (data.projects || []).map(p => ({
      name: p.name,
      slug: (p.url.match(/\/p\/([^/]+)/) || [])[1] || ''
    })).filter(p => p.slug);
    cacheSet(key, projects);
    return projects;
  } catch { return []; }
}

// SF download total for a folder (path = release tag) or the whole project (empty path)
async function fetchSfDownloads(project, path = '') {
  const key = `sfdl:${project}:${path}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    const end = new Date().toISOString().slice(0, 10);
    const folder = path ? encodeURIComponent(path) + '/' : '';
    const url = `https://sourceforge.net/projects/${project}/files/${folder}stats/json?start_date=2000-01-01&end_date=${end}`;
    // redirect: 'error' — a missing SF folder redirects (301) to the HTML files page
    const resp = await fetch(url, { redirect: 'error' });
    if (!resp.ok) return 0;
    const data = await resp.json();
    const total = data.total || 0;
    cacheSet(key, total);
    return total;
  } catch { return 0; }
}

// ---- MIRRORS ----

// Loads each mirror's project list once, then matches the given repos by normalized name
async function resolveMirrors(repoNames) {
  await Promise.all(state.mirrors.map(async m => {
    if (!m.names) {
      if (m.forge === 'sourceforge') {
        m.names = await fetchSfProjects(m.user);
      } else {
        const repos = await adapters[m.forge].listRepos(m.user).catch(() => []);
        m.names = repos.map(r => ({ name: r.name, slug: r.name }));
      }
      m.map = {};
      m._rels = {};
    }
    repoNames.forEach(rn => {
      if (rn in m.map) return;
      const n = normalizeName(rn);
      const match = m.names.find(p => normalizeName(p.slug) === n || normalizeName(p.name) === n);
      m.map[rn] = match ? match.slug : null;
    });
  }));
}

// Mirrors matching a given repo: [{m, target}]
function mirrorsOf(repoName) {
  return state.mirrors
    .filter(m => m.map && m.map[repoName])
    .map(m => ({ m, target: m.map[repoName] }));
}

// Download count of one release tag on one mirror
async function mirrorDlForTag(entry, tag) {
  const { m, target } = entry;
  if (m.forge === 'sourceforge') return fetchSfDownloads(target, tag);
  // github / codeberg: fetch the mirror repo's releases once, then read tags from memory
  if (!m._rels[target]) {
    m._rels[target] = adapters[m.forge].listReleases(m.user, target).then(rels => {
      const map = {};
      rels.forEach(r => { map[r.tag] = countableAssets(r).reduce((s, a) => s + (a.downloads || 0), 0); });
      return map;
    });
  }
  const map = await m._rels[target];
  return map[tag] || 0;
}

// All mirror contributions for a tag: [{label, forge, count}] (only counts > 0)
async function mirrorPartsForTag(repoName, tag) {
  const entries = mirrorsOf(repoName);
  const counts = await Promise.all(entries.map(e => mirrorDlForTag(e, tag)));
  return entries.map((e, i) => ({ label: FORGES[e.m.forge].label, forge: e.m.forge, count: counts[i] }))
                .filter(p => p.count > 0);
}

function partsTotal(parts) { return parts.reduce((s, p) => s + p.count, 0); }

function partsTitle(mainDl, parts) {
  const bits = [];
  if (mainDl !== null) bits.push(`${FORGES[state.main.forge].label}: ${mainDl}`);
  parts.forEach(p => bits.push(`${p.label}: ${p.count}`));
  return bits.join(' · ');
}

// ---- HELPERS ----

function formatNumber(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return `${days}d ago`;
  if (days < 365) return `${Math.floor(days / 30)}mo ago`;
  return `${Math.floor(days / 365)}y ago`;
}

async function renderDashboard() {
  const app = document.getElementById('app');
  const forge = FORGES[state.main.forge];
  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading ${forge.label} repositories for <strong>${state.main.user}</strong>...</span></div>`;

  let repos;
  try {
    repos = await adapters[state.main.forge].listRepos(state.main.user);
  } catch (e) {
    app.innerHTML = `<div class="error-box"><h3>Error</h3><p>${e.message}</p></div>`;
    return;
  }

  if (repos.length === 0) {
    app.innerHTML = `<div class="error-box"><h3>No repositories found</h3><p>Check the ${forge.label} profile.</p></div>`;
    return;
  }

  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading releases...</span></div>`;

  const [releases] = await Promise.all([
    Promise.all(repos.map(r => adapters[state.main.forge].latestRelease(state.main.user, r.name))),
    resolveMirrors(repos.map(r => r.name))
  ]);

  // Mirror downloads of each repo's latest release
  const mirrorParts = await Promise.all(repos.map((r, i) =>
    releases[i] ? mirrorPartsForTag(r.name, releases[i].tag) : Promise.resolve([])
  ));

  const repoData = repos.map((r, i) => {
    const mainDl = releases[i] ? releaseMainDl(releases[i]) : 0;
    const mirrorDl = partsTotal(mirrorParts[i]);
    return {
      ...r,
      latestRelease: releases[i],
      mainDl,
      mirrorParts: mirrorParts[i],
      latestReleaseDl: (mainDl || 0) + mirrorDl
    };
  });

  // Global stats
  const totalStars = repoData.reduce((s, r) => s + r.stars, 0);
  const totalForks = repoData.reduce((s, r) => s + r.forks, 0);
  const totalIssues = repoData.reduce((s, r) => s + r.issues, 0);
  const totalDl = repoData.reduce((s, r) => s + r.latestReleaseDl, 0);
  const anyMirror = repoData.some(r => r.mirrorParts.length > 0);
  const showDl = forge.counts || anyMirror;
  const reposWithRelease = repoData.filter(r => r.latestRelease);
  const languages = [...new Set(repoData.map(r => r.language).filter(Boolean))];

  // Most recent release across all repos
  let mostRecentRelease = null, mostRecentRepo = null;
  repoData.forEach(r => {
    if (r.latestRelease) {
      if (!mostRecentRelease || new Date(r.latestRelease.date) > new Date(mostRecentRelease.date)) {
        mostRecentRelease = r.latestRelease;
        mostRecentRepo = r;
      }
    }
  });

  document.getElementById('breadcrumb').innerHTML = `
    ${state.main.forge === 'github' ? `<img class="header-avatar" src="https://github.com/${state.main.user}.png?size=64" alt="">` : ''}
    <strong>${state.main.user}</strong>

    <span>${forge.label}</span>
    <span>·</span>
    <span>${repoData.length} repos</span>
    <a onclick="navigateHome()" style="font-size:12px">(change)</a>
  `;

    html += `
    <div class="release-banner">
      <div class="release-tag">${mostRecentRelease.tag}</div>
      <div class="release-info">
        <div class="release-name">${mostRecentRepo.name} — ${mostRecentRelease.name || mostRecentRelease.tag}</div>
        <div class="release-meta">
          <span>📅 ${formatDate(mostRecentRelease.date)}</span>
          <span>⏱ ${timeAgo(mostRecentRelease.date)}</span>
          <span>${mostRecentRelease.prerelease ? '⚠️ Pre-release' : '✅ Stable'}</span>
        </div>
      </div>
      ${showDl ? `
      <div class="release-downloads">
        ${formatNumber(mostRecentRepo.latestReleaseDl)}
        <small>downloads (this release)${mostRecentRepo.mirrorParts.length ? ` — ${partsTitle(mostRecentRepo.mainDl, mostRecentRepo.mirrorParts)}` : ''}</small>
      </div>` : ''}
    </div>`;

  // Stats cards
  html += `
  <div class="stats-grid">
    <div class="stat-card"><div class="value">${repoData.length}</div><div class="label">Repositories</div></div>
    <div class="stat-card"><div class="value">${formatNumber(totalStars)}</div><div class="label">⭐ Total Stars</div></div>
    <div class="stat-card"><div class="value">${formatNumber(totalForks)}</div><div class="label">🔀 Total Forks</div></div>
    <div class="stat-card"><div class="value">${totalIssues}</div><div class="label">🔓 Open Issues</div></div>

    ${languages.length ? `<div class="stat-card"><div class="value">${languages.length}</div><div class="label">🌐 Languages</div></div>` : ''}
  </div>`;

  // Charts
  html += `
  <div class="charts-grid">
    <div class="chart-card"><h3>⭐ Stars per repo (Top 10)</h3><canvas id="chartStars"></canvas></div>
    ${languages.length ? `<div class="chart-card"><h3>🌐 Language breakdown</h3><canvas id="chartLangs"></canvas></div>` : ''}
    ${showDl ? `<div class="chart-card"><h3>⬇️ Downloads per repo</h3><canvas id="chartDownloads"></canvas></div>` : ''}

  </div>`;

  // Sort bar + repos
  html += `
  <div class="section">
    <div class="section-title">📂 Repositories</div>

  function renderRepoCards(list) {

    grid.innerHTML = list.map(r => `
      <div class="repo-card" onclick="navigateToRepo('${r.name}')">
        <div class="repo-name">${r.private ? '🔒 ' : ''}${r.name}</div>
        <div class="repo-desc">${r.description || '<em>No description</em>'}</div>
        <div class="repo-meta">
          ${r.language ? `<span><span class="lang-dot" style="background:${LANG_COLORS[r.language] || '#888'}"></span> ${r.language}</span>` : ''}
          <span>⭐ ${formatNumber(r.stars)}</span>
          <span>🔀 ${r.forks}</span>
          <span>🔓 ${r.issues}</span>
          <span>📅 ${timeAgo(r.updated)}</span>
        </div>
        ${r.latestRelease ? `
        <div class="repo-release">
          <span class="tag">${r.latestRelease.tag}</span>
          ${showDl ? `<span class="dl" ${r.mirrorParts.length ? `title="${partsTitle(r.mainDl, r.mirrorParts)}"` : ''}>⬇️ ${formatNumber(r.latestReleaseDl)} downloads${r.mirrorParts.length ? ' <small style="color:var(--text2);font-weight:400">(+mirrors)</small>' : ''}</span>` : ''}
        </div>` : ''}
      </div>
    `).join('');
  }

  function sortAndFilter() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;

    filtered.sort((a, b) => {
      switch (sort) {
        case 'stars': return b.stars - a.stars;
        case 'forks': return b.forks - a.forks;
        case 'updated': return new Date(b.updated) - new Date(a.updated);
        case 'name': return a.name.localeCompare(b.name);
        case 'downloads': return b.latestReleaseDl - a.latestReleaseDl;
        case 'issues': return b.issues - a.issues;
      }

  document.getElementById('searchInput').addEventListener('input', sortAndFilter);
  document.getElementById('sortSelect').addEventListener('change', sortAndFilter);
  sortAndFilter();

  Chart.defaults.color = '#8b949e';

  // Stars chart
  const topStars = [...repoData].sort((a, b) => b.stars - a.stars).slice(0, 10);
  new Chart(document.getElementById('chartStars'), {
    type: 'bar',
    data: {
      labels: topStars.map(r => r.name),

        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#30363d33' } },
          y: { grid: { display: false } }
        }
      }
    });
  }

  // Activity chart (last updated by month)
  const months = {};
  repoData.forEach(r => {
    const d = new Date(r.pushed || r.updated);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    months[key] = (months[key] || 0) + 1;
  });
  const sortedMonths = Object.entries(months).sort((a, b) => a[0].localeCompare(b[0]));
  new Chart(document.getElementById('chartActivity'), {
    type: 'line',
    data: {
      labels: sortedMonths.map(e => e[0]),
      datasets: [{
        data: sortedMonths.map(e => e[1]),
        borderColor: '#3fb950',
        backgroundColor: '#3fb95022',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#3fb950',
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#30363d33' } },
        y: { grid: { color: '#30363d33' }, beginAtZero: true }
      }
    }
  });

    <div class="stat-card highlight"><div class="value">${releases.length}</div><div class="label">📦 Releases</div></div>
    ${showDl ? `<div class="stat-card downloads"><div class="value">${formatNumber(totalDl)}</div><div class="label">⬇️ Total Downloads${anyMirror ? ' (all sources)' : ''}</div></div>` : ''}
    ${anyMirror ? `<div class="stat-card downloads"><div class="value">${formatNumber(mirrorTotal)}</div><div class="label">⬇️ from mirrors</div></div>` : ''}
    ${repoSize !== null ? `<div class="stat-card"><div class="value">${repoSize}</div><div class="label">💾 Size</div></div>` : ''}
    ${contributors.length ? `<div class="stat-card"><div class="value">${contributors.length}</div><div class="label">👥 Contributors</div></div>` : ''}
  </div>

  <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
    <div class="stat-card"><div class="value" style="font-size:16px">${formatDate(repo.created)}</div><div class="label">📅 Created</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${formatDate(repo.updated)}</div><div class="label">🔄 Last updated</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${repo.license || 'None'}</div><div class="label">📜 License</div></div>
    <div class="stat-card"><div class="value" style="font-size:16px">${repo.branch || '—'}</div><div class="label">🌿 Default branch</div></div>
  </div>`;

  // Latest release banner
  if (latestRelease) {
    const mainDl = releaseMainDl(latestRelease);
    const parts = partsOf(latestRelease);
    html += `
    <div class="release-banner">
      <div class="release-tag">${latestRelease.tag}</div>
      <div class="release-info">
        <div class="release-name">${latestRelease.name || latestRelease.tag}</div>
        <div class="release-meta">
          <span>📅 ${formatDate(latestRelease.date)}</span>
          <span>⏱ ${timeAgo(latestRelease.date)}</span>
          <span>${latestRelease.prerelease ? '⚠️ Pre-release' : '✅ Stable'}</span>
        </div>
      </div>
      ${showDl ? `
      <div class="release-downloads">
        ${formatNumber(combinedDl(latestRelease))}
        <small>downloads (latest release)${parts.length ? ` — ${partsTitle(mainDl, parts)}` : ''}</small>
      </div>` : ''}
    </div>`;
  }

  // Charts
  html += `<div class="charts-grid">`;

  const langEntries = Object.entries(languages || {});
  if (langEntries.length > 0) {
    html += `<div class="chart-card"><h3>🌐 Languages</h3><canvas id="chartLangsDetail"></canvas></div>`;
  }
  if (Array.isArray(commitActivity) && commitActivity.length > 0) {
    html += `<div class="chart-card"><h3>📊 Commits (last 52 weeks)</h3><canvas id="chartCommits"></canvas></div>`;
  }
  if (releases.length > 0 && showDl) {
    html += `<div class="chart-card"><h3>⬇️ Downloads per release</h3><canvas id="chartReleaseDl"></canvas></div>`;
  }
  if (participation && participation.owner) {
    html += `<div class="chart-card"><h3>👥 Participation (owner vs others)</h3><canvas id="chartParticipation"></canvas></div>`;
  }
  if (releases.length > 0 && showDl) {
    html += `<div class="chart-card" style="grid-column: 1 / -1;"><h3>📈 Asset Downloads per Release</h3><canvas id="chartDlTimeline"></canvas></div>`;
  }

  html += `</div>`;

  // Contributors
  if (contributors.length > 0) {
    html += `
    <div class="section">
      <div class="section-title">👥 Contributors (Top ${Math.min(contributors.length, 20)})</div>
      <div class="contributors-grid">
        ${contributors.slice(0, 20).map(c => `
          ${c.url ? `<a class="contributor" href="${c.url}" target="_blank">` : `<span class="contributor">`}
            ${c.avatar ? `<img src="${c.avatar}&s=56" alt="${c.name}">` : `<span class="initial">${(c.name || '?').charAt(0).toUpperCase()}</span>`}
            <span>${c.name}</span>
            <span style="color:var(--text2);font-size:11px">${c.contributions}</span>
          ${c.url ? `</a>` : `</span>`}
        `).join('')}
      </div>
    </div>`;
  }

  // All releases
  if (releases.length > 0) {
    html += `
    <div class="section">
      <div class="section-title">📦 All releases (${releases.length})</div>
      ${!forge.counts && !anyMirror ? `<p style="color:var(--text2);font-size:13px;margin-bottom:10px">${forge.label} does not expose download counts for release assets.</p>` : ''}
      <div class="releases-list">
        ${releases.map(r => `
          <div class="release-item">
            <span class="tag-name">${r.tag}</span>
            <span class="name">${r.name || r.tag}</span>
            <span class="date">${formatDate(r.date)}</span>
            ${showDl ? `<span class="downloads">⬇️ ${formatNumber(combinedDl(r))}${partsOf(r).length ? ` <small style="color:var(--text2);font-weight:400">(${partsTitle(releaseMainDl(r), partsOf(r))})</small>` : ''}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;

    // Assets of the latest release
    if (latestRelease && latestRelease.assets && latestRelease.assets.length > 0) {
      html += `
      <div class="section">
        <div class="section-title">📎 Assets — ${latestRelease.tag}</div>
        <div class="releases-list">
          ${latestRelease.assets.map(a => `
            <div class="release-item">
              <span class="name" style="font-size:13px">${a.name}</span>
              ${a.size !== null ? `<span class="date">${(a.size / 1048576).toFixed(1)} MB</span>` : ''}
              <span class="downloads">⬇️ ${a.downloads === null ? 'n/a' : formatNumber(a.downloads)}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    }
  }

  app.innerHTML = html;

  // Charts rendering
  if (langEntries.length > 0) {
    const totalBytes = langEntries.reduce((s, e) => s + e[1], 0);
    new Chart(document.getElementById('chartLangsDetail'), {
      type: 'doughnut',
      data: {
        labels: langEntries.map(e => `${e[0]} (${(e[1]/totalBytes*100).toFixed(1)}%)`),
        datasets: [{
          data: langEntries.map(e => e[1]),
          backgroundColor: langEntries.map(e => LANG_COLORS[e[0]] || '#888'),
          borderColor: '#161b22',
          borderWidth: 2,
        }]
      },
      options: {
        plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } }
      }
    });
  }

  if (Array.isArray(commitActivity) && commitActivity.length > 0) {
    const weeks = commitActivity.slice(-52);
    new Chart(document.getElementById('chartCommits'), {
      type: 'bar',
      data: {
        labels: weeks.map(w => {
          const d = new Date(w.week * 1000);
          return `${d.getDate()}/${d.getMonth()+1}`;
        }),
        datasets: [{
          data: weeks.map(w => w.total),
          backgroundColor: '#58a6ff66',
          borderColor: '#58a6ff',
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { maxTicksLimit: 12, font: { size: 10 } } },
          y: { grid: { color: '#30363d33' }, beginAtZero: true }
        }
      }
    });
  }

  if (releases.length > 0 && showDl) {
    const releasesReversed = [...releases].reverse().slice(-20);
    const dlDatasets = [];
    if (forge.counts) {
      dlDatasets.push({
        label: forge.label,
        data: releasesReversed.map(r => releaseMainDl(r) || 0),
        backgroundColor: forge.color + '66',
        borderColor: forge.color,
        borderWidth: 1,
        borderRadius: 4,
      });
    }
    // One stacked dataset per mirror forge present
    const mirrorForges = [...new Set(releases.flatMap(r => partsOf(r).map(p => p.forge)))];
    mirrorForges.forEach(f => {
      dlDatasets.push({
        label: FORGES[f].label,
        data: releasesReversed.map(r => (partsOf(r).find(p => p.forge === f) || {}).count || 0),
        backgroundColor: FORGES[f].color + '66',
        borderColor: FORGES[f].color,
        borderWidth: 1,
        borderRadius: 4,
      });
    });
    new Chart(document.getElementById('chartReleaseDl'), {
      type: 'bar',
      data: {
        labels: releasesReversed.map(r => r.tag),
        datasets: dlDatasets
      },
      options: {
        plugins: { legend: { display: dlDatasets.length > 1, labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { stacked: true, grid: { color: '#30363d33' }, beginAtZero: true }
        }
      }
    });
  }

  // Asset downloads per release (line chart)
  if (releases.length > 0 && showDl) {
    const lineColors = ['#58a6ff','#3fb950','#FA4016','#d2a8ff','#e3b341','#ff7b72','#79c0ff','#7ee787','#ffa657','#bc8cff','#56d4dd','#f2cc60'];
    const sortedReleases = [...releases].reverse();
    const labels = sortedReleases.map(r => r.tag);

    // Normalize asset names to group across releases
    function normalizeAssetName(name) {
      return name
        .replace(/[-_]?v?\d+\.\d+(\.\d+)*/g, '')
        .replace(/--+/g, '-').replace(/__+/g, '_')
        .replace(/^[-_]+|[-_]+$/g, '');
    }

    const datasets = [];

    if (forge.counts) {
      const normalizedSet = new Set();
      sortedReleases.forEach(r => countableAssets(r).forEach(a => normalizedSet.add(normalizeAssetName(a.name))));
      const assetGroups = [...normalizedSet].filter(n => n.length > 0);

      assetGroups.forEach((group, i) => {
        const color = lineColors[i % lineColors.length];
        datasets.push({
          label: group,
          data: sortedReleases.map(r => {
            return countableAssets(r)
              .filter(a => normalizeAssetName(a.name) === group)
              .reduce((sum, a) => sum + (a.downloads || 0), 0);
          }),
          borderColor: color,
          backgroundColor: color + '22',
          pointBackgroundColor: color,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
          tension: 0.2,
          fill: false,
        });
      });
    }

    // One line per mirror forge (per-release totals)
    const mirrorForges = [...new Set(releases.flatMap(r => partsOf(r).map(p => p.forge)))];
    mirrorForges.forEach(f => {
      datasets.push({
        label: FORGES[f].label,
        data: sortedReleases.map(r => (partsOf(r).find(p => p.forge === f) || {}).count || 0),
        borderColor: FORGES[f].color,
        backgroundColor: FORGES[f].color + '22',
        pointBackgroundColor: FORGES[f].color,
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        tension: 0.2,
        fill: false,
      });
    });

    // Total line (all sources)
    datasets.push({
      label: 'Total',
      data: sortedReleases.map(r => combinedDl(r)),
      borderColor: '#e6edf3',
      backgroundColor: '#e6edf322',
      pointBackgroundColor: '#e6edf3',
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2.5,
      borderDash: [6, 3],
      tension: 0.2,
      fill: false,
    });

    new Chart(document.getElementById('chartDlTimeline'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 11 } } },
          tooltip: {
            filter: ctx => ctx.parsed.y > 0,
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} DL`
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#30363d22' },
            ticks: { font: { size: 10 } },
            title: { display: true, text: 'Release Tags', color: '#8b949e', font: { size: 11 } }
          },
          y: {
            grid: { color: '#30363d33' },
            beginAtZero: true,
            title: { display: true, text: 'Downloads', color: '#8b949e', font: { size: 11 } }
          }
        }
      }
    });
  }

  if (participation && participation.owner) {
    const labels = participation.owner.map((_, i) => `W${i+1}`);
    new Chart(document.getElementById('chartParticipation'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Owner',
            data: participation.owner,
            borderColor: '#58a6ff',
            backgroundColor: '#58a6ff22',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
          },
          {
            label: 'Others',
            data: participation.all.map((v, i) => v - participation.owner[i]),
            borderColor: '#3fb950',
            backgroundColor: '#3fb95022',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
          }
        ]
      },
      options: {
        plugins: { legend: { labels: { boxWidth: 12, padding: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
          y: { grid: { color: '#30363d33' }, beginAtZero: true }
        }
      }
    });
  }
}

// ---- LANDING ----

// Accepts a profile URL from any supported forge, "forge:user", or a bare username (assumed GitHub)
function parseProfile(input) {
  input = (input || '').trim();
  if (!input) return null;
  const urlPatterns = [
    { forge: 'github',      re: /github\.com\/([A-Za-z0-9-]+)/i },
    { forge: 'gitlab',      re: /gitlab\.com\/([A-Za-z0-9_.-]+)/i },
    { forge: 'codeberg',    re: /codeberg\.org\/([A-Za-z0-9_.-]+)/i },
    { forge: 'sourceforge', re: /sourceforge\.net\/u\/([A-Za-z0-9_.-]+)/i },
  ];
  for (const p of urlPatterns) {
    const m = input.match(p.re);
    if (m) return { forge: p.forge, user: m[1] };
  }
  const prefixed = input.match(/^(github|gitlab|codeberg|sourceforge):(.+)$/i);
  if (prefixed && /^[A-Za-z0-9_.-]+$/.test(prefixed[2])) {
    return { forge: prefixed[1].toLowerCase(), user: prefixed[2] };
  }
  const clean = input.replace(/^@/, '');
  if (/^[A-Za-z0-9-]+$/.test(clean)) return { forge: 'github', user: clean };
  return null;
}

function renderLanding() {
  document.getElementById('breadcrumb').innerHTML = '';
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="landing">
    <h2>📊 ForgeStats</h2>
    <p>Repository, release and download stats for any account on a software forge — GitHub, GitLab or Codeberg — with download counts from mirrors (GitHub, Codeberg, SourceForge) automatically detected and added. Projects are matched across forges by name.</p>
    <div class="landing-form">
      <label>Main profile <span class="req">required — GitHub, GitLab or Codeberg</span></label>
      <input type="text" id="mainInput" placeholder="https://github.com/username — or gitlab.com/…, codeberg.org/…">
      <label>Mirror profiles <span class="opt">optional — comma separated, adds their download counts</span></label>
      <input type="text" id="mirrorsInput" placeholder="https://sourceforge.net/u/username/profile, https://codeberg.org/username">
      <label>GitHub token <span class="opt">optional — only used for github.com calls</span></label>
      <input type="password" id="tokenInput" placeholder="ghp_... or github_pat_..." autocomplete="off">
      <button class="btn btn-primary" id="goBtn">View stats</button>
      <p class="landing-error" id="landingError"></p>
      <p class="landing-note" style="text-align:center">Or see a live example: <a href="#main=github:djethino&mirrors=sourceforge:asymptomatik">GitHub profile with a SourceForge mirror →</a></p>
      <p class="landing-note">🔒 <strong>Token security:</strong> this page has no backend. Your token is stored only in this browser (localStorage) and sent only to <code>api.github.com</code> — never anywhere else. It never appears in the URL. Clear the field and submit again to remove it.</p>
      <p class="landing-note">Without a token, GitHub allows 60 API requests/hour (responses are cached for 30 min). With a token: 5,000/hour — and if the token belongs to the GitHub profile you enter, your <strong>private repos</strong> are included too. A fine-grained read-only token is recommended.</p>
      <p class="landing-note">Notes: GitLab does not expose download counts (its releases are listed without numbers, and it cannot be a mirror). SourceForge can only be used as a mirror.</p>
    </div>
  </div>`;
  document.getElementById('goBtn').addEventListener('click', submitLanding);
  app.querySelectorAll('input').forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') submitLanding(); })
  );
}

function submitLanding() {
  const err = document.getElementById('landingError');
  const main = parseProfile(document.getElementById('mainInput').value);
  if (!main) {
    err.textContent = 'Please enter a valid main profile (link or username).';
    return;
  }
  if (!FORGES[main.forge].main) {
    err.textContent = `${FORGES[main.forge].label} can only be used as a mirror.`;
    return;
  }
  const mirrorInputs = document.getElementById('mirrorsInput').value.split(/[,\s]+/).filter(Boolean);
  const mirrors = [];
  for (const mi of mirrorInputs) {
    const p = parseProfile(mi);
    if (!p) { err.textContent = `Unrecognized mirror profile: "${mi}"`; return; }
    if (!FORGES[p.forge].mirror) {
      err.textContent = `${FORGES[p.forge].label} cannot be used as a mirror (no download counts).`;
      return;
    }
    if (p.forge === main.forge && p.user.toLowerCase() === main.user.toLowerCase()) continue;
    mirrors.push(p);
  }
  const token = document.getElementById('tokenInput').value.trim();
  try { token ? localStorage.setItem('fgs_token', token) : localStorage.removeItem('fgs_token'); } catch {}
  const mirrorStr = mirrors.map(m => `${m.forge}:${m.user}`).join(',');
  window.location.hash = `main=${encodeURIComponent(`${main.forge}:${main.user}`)}${mirrorStr ? `&mirrors=${encodeURIComponent(mirrorStr)}` : ''}`;
}

// ---- NAVIGATION (shareable hash: #main=forge:user&mirrors=forge:user,...&repo=name) ----

function baseHash() {
  let h = `main=${encodeURIComponent(`${state.main.forge}:${state.main.user}`)}`;
  if (state.mirrors.length) {
    h += `&mirrors=${encodeURIComponent(state.mirrors.map(m => `${m.forge}:${m.user}`).join(','))}`;
  }
  return h;
}

function navigateHome() { window.location.hash = ''; }
function navigateDash() { window.location.hash = baseHash(); }
function navigateToRepo(name) { window.location.hash = `${baseHash()}&repo=${encodeURIComponent(name)}`; }

function parseRef(s) {
  const m = (s || '').match(/^(github|gitlab|codeberg|sourceforge):([A-Za-z0-9_.-]+)$/i);
  return m ? { forge: m[1].toLowerCase(), user: m[2] } : null;
}

function handleRoute() {
  const p = new URLSearchParams(window.location.hash.slice(1));
  const main = parseRef(p.get('main'));
  if (!main || !FORGES[main.forge] || !FORGES[main.forge].main) { renderLanding(); return; }

  const mirrors = (p.get('mirrors') || '').split(',').map(parseRef)
    .filter(m => m && FORGES[m.forge] && FORGES[m.forge].mirror);

  const key = `${main.forge}:${main.user}|${mirrors.map(m => `${m.forge}:${m.user}`).join(',')}`;
  if (key !== state.mirrorsKey) {
    state.main = main;
    state.mirrors = mirrors;
    state.mirrorsKey = key;
  }

  const repo = p.get('repo');
  if (repo) renderRepoDetail(repo); else renderDashboard();
}

window.addEventListener('hashchange', handleRoute);

// Init
handleRoute();
</script>
